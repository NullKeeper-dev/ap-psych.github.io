      els.cardShell.classList.remove('is-dragging');
      els.cardShell.style.removeProperty('--drag-x');
      els.cardShell.style.removeProperty('--drag-rotate');
      els.cardShell.style.removeProperty('--drag-opacity');
    }

    function updateStatus(cardId, nextStatus) {
      const card = state.cards[cardId];
      const previousStatus = card.status;
      if (previousStatus === nextStatus) {
        return;
      }

      if (previousStatus === 'known') {
        state.counts.known -= 1;
      }
      if (previousStatus === 'review') {
        state.counts.review -= 1;
      }

      let pulseKey = '';
      if (nextStatus === 'known') {
        state.counts.known += 1;
        pulseKey = 'known';
      }
      if (nextStatus === 'review') {
        state.counts.review += 1;
        pulseKey = 'review';
      }
      card.status = nextStatus;
      renderCounters(pulseKey);
    }

    function commitAdvance(action) {
      const cardId = state.currentCardId;
      if (cardId === null) {
        return;
      }

      if (state.mode === 'review') {
        if (action === 'skip') {
          state.reviewQueue.push(state.reviewQueue.shift());
        } else {
          state.reviewQueue.shift();
          updateStatus(cardId, action === 'known' ? 'known' : 'review');
          state.view.completed += 1;
        }
      } else {
        const queue = state.queues[state.activeUnit];
        if (action === 'skip') {
          queue.push(queue.shift());
        } else {
          queue.shift();
          updateStatus(cardId, action === 'known' ? 'known' : 'review');
          state.view.completed += 1;
        }
      }
    }

    function advanceCard(action) {
      if (state.currentCardId === null || state.isAnimating) {
        return;
      }
      if ((action === 'known' || action === 'review') && !state.isFlipped) {
        return;
      }

      const exitClass = action === 'known' ? 'to-known' : action === 'review' ? 'to-review' : 'to-skip';
      const duration = action === 'skip' ? 220 : 350;

      state.isAnimating = true;
      state.isFlipped = false;
      clearDrag();
      els.cardShell.classList.remove('is-flipped', 'is-enter-prep', 'is-enter-active');
      updateCardAria(state.cards[state.currentCardId]);

      requestAnimationFrame(() => {
        els.cardShell.classList.add('is-exiting', exitClass);
      });

      window.setTimeout(() => {
        commitAdvance(action);
        els.cardShell.classList.remove('is-exiting', exitClass);
        state.currentCardId = getNextCardId();
        renderCard();
        if (state.currentCardId !== null) {
          playEntry(() => {
            state.isAnimating = false;
          });
        } else {
          state.isAnimating = false;
          const fallback = els.retryButton.disabled ? els.filterButtons[0] : els.retryButton;
          queueMicrotask(() => fallback.focus({ preventScroll: true }));
        }
      }, duration);
    }

    function handlePointerDown(event) {
      if (state.currentCardId === null || state.isAnimating) {
        return;
      }
      if (event.button !== undefined && event.button !== 0) {
        return;
      }
      if (event.target.closest('.card-actions')) {
        return;
      }
      state.drag = {
        active: true,
        pointerId: event.pointerId,
        startX: event.clientX,
        deltaX: 0,
        moved: false,
        canSwipe: state.isFlipped
      };
      els.cardShell.setPointerCapture(event.pointerId);
    }

    function handlePointerMove(event) {
      if (!state.drag.active || event.pointerId !== state.drag.pointerId || !state.drag.canSwipe) {
        return;
      }
      state.drag.deltaX = event.clientX - state.drag.startX;
      if (Math.abs(state.drag.deltaX) > 6) {
        state.drag.moved = true;
        applyDrag(state.drag.deltaX);
      }
    }

    function finishPointer(event) {
      if (!state.drag.active || event.pointerId !== state.drag.pointerId) {
        return;
      }
      try {
        els.cardShell.releasePointerCapture(event.pointerId);
      } catch (error) {
        void error;
      }

      const { canSwipe, moved, deltaX } = state.drag;
      state.drag.active = false;
      state.drag.pointerId = null;

      if (canSwipe && moved) {
        if (Math.abs(deltaX) >= 96) {
          clearDrag();
          advanceCard(deltaX > 0 ? 'known' : 'review');
          return;
        }
        clearDrag();
        return;
      }

      clearDrag();
      if (!event.target.closest('.card-actions')) {
        toggleFlip();
      }
    }

    function cancelPointer() {
      state.drag.active = false;
      state.drag.pointerId = null;
      clearDrag();
    }

    function handleCardKeydown(event) {
      if (state.currentCardId === null || state.isAnimating) {
        return;
      }
      if (event.key === ' ' || event.key === 'Enter') {
        event.preventDefault();
        toggleFlip();
        return;
      }
      if (event.key === 'ArrowRight') {
        event.preventDefault();
        advanceCard('known');
        return;
      }
      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        advanceCard('review');
      }
    }

    function bindEvents() {
      els.filterGroup.addEventListener('click', (event) => {
        const target = event.target.closest('[data-unit]');
        if (!target) {
          return;
        }
        setDeck(target.dataset.unit);
      });

      els.skipButton.addEventListener('click', () => advanceCard('skip'));
      els.knownButton.addEventListener('click', () => advanceCard('known'));
      els.reviewButton.addEventListener('click', () => advanceCard('review'));
      els.retryButton.addEventListener('click', () => {
        if (state.counts.review > 0) {
          setReviewPile();
        }
      });

          els.themeToggle.addEventListener('click', () => {
            const isDark = !els.body.classList.contains('is-dark');
            els.body.classList.toggle('is-dark', isDark);
            els.themeToggle.setAttribute('aria-pressed', String(isDark));
            els.themeToggle.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
            els.themeToggle.classList.remove('is-spinning');
            void els.themeToggle.offsetWidth;
            els.themeToggle.classList.add('is-spinning');
          });

      els.cardShell.addEventListener('pointerdown', handlePointerDown);
      els.cardShell.addEventListener('pointermove', handlePointerMove);
      els.cardShell.addEventListener('pointerup', finishPointer);
      els.cardShell.addEventListener('pointercancel', cancelPointer);
      els.flashcard.addEventListener('keydown', handleCardKeydown);
    }

        function init() {
          state.queues = buildQueues();
          renderCounters();
          bindEvents();
          els.themeToggle.setAttribute('aria-label', 'Switch to dark mode');
          setDeck('All');
        }

    init();
  </script>
</body>
</html>
