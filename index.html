
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AP Psych Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --bg-accent: rgba(0, 0, 0, 0.03);
      --grid: rgba(0, 0, 0, 0.045);
      --text: #000000;
      --muted: #646464;
      --border: #e0e0e0;
      --surface: #ffffff;
      --surface-soft: #fafafa;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      --pill: #f5f5f5;
      --progress-track: #efefef;
      --progress-fill: #000000;
      --button-bg: rgba(255, 255, 255, 0.94);
      --button-hover: #000000;
      --button-text: #000000;
      --button-invert: #ffffff;
      --focus: 0 0 0 3px rgba(0, 0, 0, 0.16);
      --ease-main: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    body.is-dark {
      color-scheme: dark;
      --bg: #0a0a0a;
      --bg-accent: rgba(255, 255, 255, 0.04);
      --grid: rgba(255, 255, 255, 0.045);
      --text: #f0f0f0;
      --muted: #a3a3a3;
      --border: #2a2a2a;
      --surface: #141414;
      --surface-soft: #101010;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.38);
      --pill: #141414;
      --progress-track: #1a1a1a;
      --progress-fill: #f0f0f0;
      --button-bg: rgba(20, 20, 20, 0.96);
      --button-hover: #f0f0f0;
      --button-text: #f0f0f0;
      --button-invert: #0a0a0a;
      --focus: 0 0 0 3px rgba(240, 240, 240, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Figtree', sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    body::before {
      background:
        radial-gradient(circle at top, var(--bg-accent), transparent 42%),
        linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.01) 100%);
    }

    body::after {
      background-image:
        linear-gradient(to right, var(--grid) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.7;
    }

    button,
    select {
      font: inherit;
    }

    .app {
      min-height: 100svh;
      width: min(100%, 1120px);
      margin: 0 auto;
      padding: clamp(20px, 4vw, 36px);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: clamp(18px, 2vw, 22px);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 12px;
    }

    .brand {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.98rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .progress-meta {
      justify-self: center;
      text-align: center;
      min-width: 120px;
    }

    .progress-count {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.94rem;
      font-weight: 600;
      letter-spacing: 0.06em;
    }

    .progress-scope {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .topbar-actions {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .theme-toggle {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      width: 48px;
      height: 48px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, color 180ms ease, background-color 180ms ease;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
    }

    .theme-toggle:focus-visible,
    .filter-chip:focus-visible,
    .skip-link:focus-visible,
    .action-button:focus-visible,
    .retry-button:focus-visible,
    .flashcard:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .theme-toggle.is-spinning .theme-icon {
      animation: theme-spin 300ms linear;
    }

    .theme-icon {
      position: relative;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      color: currentColor;
      transition: color 180ms ease;
    }

    .theme-icon::before,
    .theme-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    .theme-icon::before {
      background: currentColor;
      box-shadow:
        0 -12px 0 -9px currentColor,
        0 12px 0 -9px currentColor,
        12px 0 0 -9px currentColor,
        -12px 0 0 -9px currentColor,
        8px 8px 0 -9px currentColor,
        -8px -8px 0 -9px currentColor,
        8px -8px 0 -9px currentColor,
        -8px 8px 0 -9px currentColor;
      transform: scale(0.62);
      transition: transform 300ms var(--ease-main), box-shadow 300ms var(--ease-main), background-color 180ms ease;
    }

    .theme-icon::after {
      background: var(--surface);
      transform: translate(6px, -2px) scale(0);
      transition: transform 300ms var(--ease-main), background-color 180ms ease;
    }

    body.is-dark .theme-icon::before {
      transform: scale(1);
      box-shadow: none;
    }

    body.is-dark .theme-icon::after {
      transform: translate(6px, -2px) scale(1);
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .filter-group {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .filter-chip {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 10px 14px;
      min-height: 40px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: transform 180ms ease, color 180ms ease, background-color 180ms ease;
    }

    .filter-chip:hover {
      color: var(--text);
    }

    .filter-chip.is-active {
      background: var(--text);
      color: var(--button-invert);
    }

    .skip-link {
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 8px 2px;
      font-size: 0.88rem;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.18em;
      transition: transform 180ms ease, color 180ms ease;
    }

    .skip-link:hover {
      color: var(--text);
      transform: translateX(1px);
    }

    .stage {
      display: grid;
      place-items: center;
      align-content: center;
      gap: 18px;
      min-height: 0;
    }

    .stage-frame {
      width: min(100%, 620px);
      display: grid;
      gap: 18px;
      justify-items: center;
    }

    .card-shell,
    .completion-card {
      width: min(92vw, 480px);
      aspect-ratio: 8 / 5;
      min-height: 300px;
      position: relative;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .card-shell {
      transform: translate3d(0, 0, 0) scale(1);
      opacity: 1;
      will-change: transform, opacity;
      transition:
        transform 240ms var(--ease-main),
        opacity 240ms var(--ease-main),
        border-color 180ms ease,
        box-shadow 180ms ease,
        background-color 180ms ease;
    }

    .card-shell.is-enter-prep {
      transform: translate3d(0, 0, 0) scale(0.95);
      opacity: 0;
    }

    .card-shell.is-enter-active {
      transition:
        transform 300ms ease-out,
        opacity 300ms ease-out,
        border-color 180ms ease,
        box-shadow 180ms ease,
        background-color 180ms ease;
    }

    .card-shell.is-dragging {
      transform: translate3d(var(--drag-x, 0px), 0, 0) rotate(var(--drag-rotate, 0deg));
      opacity: var(--drag-opacity, 1);
      transition: none;
    }

    .card-shell.is-exiting {
      transition:
        transform 350ms ease-in,
        opacity 350ms ease-in,
        border-color 180ms ease,
        box-shadow 180ms ease,
        background-color 180ms ease;
    }

    .card-shell.is-exiting.to-known {
      transform: translate3d(120%, 0, 0) rotate(8deg);
      opacity: 0;
    }

    .card-shell.is-exiting.to-review {
      transform: translate3d(-120%, 0, 0) rotate(-8deg);
      opacity: 0;
    }

    .card-shell.is-exiting.to-skip {
      transform: translate3d(0, -16px, 0) scale(0.985);
      opacity: 0;
      transition-duration: 220ms;
    }

    .flashcard {
      position: absolute;
      inset: 0;
      border: 0;
      background: transparent;
      padding: 0;
      border-radius: inherit;
      cursor: pointer;
      transform-style: preserve-3d;
      will-change: transform;
      transition: transform 500ms var(--ease-main);
    }

    .card-shell.is-flipped .flashcard {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      padding: 24px 24px 28px;
      border-radius: inherit;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 24%),
        var(--surface);
      transition: opacity 500ms var(--ease-main), background-color 180ms ease;
    }

    body.is-dark .card-face {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 24%),
        var(--surface);
    }

    .card-front {
      opacity: 1;
    }

    .card-back {
      transform: rotateY(180deg);
      opacity: 0;
      padding-bottom: 98px;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.015), transparent 24%),
        var(--surface-soft);
    }

    body.is-dark .card-back {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 24%),
        var(--surface-soft);
    }

    .card-shell.is-flipped .card-front {
      opacity: 0;
    }

    .card-shell.is-flipped .card-back {
      opacity: 1;
    }

    .face-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .unit-badge,
    .face-kicker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 0 11px;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.55);
      transition: border-color 180ms ease, background-color 180ms ease, color 180ms ease;
    }

    body.is-dark .unit-badge,
    body.is-dark .face-kicker {
      background: rgba(20, 20, 20, 0.8);
    }

    .term-wrap {
      display: grid;
      align-content: center;
      justify-items: start;
      gap: 14px;
      flex: 1;
    }

    .term {
      margin: 0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: clamp(1.75rem, 5vw, 2.55rem);
      line-height: 1.06;
      letter-spacing: -0.03em;
      max-width: 12ch;
      text-wrap: balance;
    }

    .definition {
      margin: 0;
      font-size: clamp(1rem, 2.4vw, 1.08rem);
      line-height: 1.58;
      max-width: 30ch;
      text-wrap: pretty;
    }

    .hint-wrap {
      display: grid;
      gap: 6px;
      color: var(--muted);
    }

    .hint-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .hint {
      margin: 0;
      font-size: 0.95rem;
      font-style: italic;
      line-height: 1.5;
      color: var(--muted);
    }

    .face-foot {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .flip-prompt {
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.72rem;
    }

    .card-actions {
      position: absolute;
      inset: auto 18px 18px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      will-change: transform, opacity;
    }

    .card-shell.is-flipped .card-actions {
      animation: actions-rise 360ms 700ms var(--ease-spring) forwards;
      pointer-events: auto;
    }

    .action-button,
    .retry-button {
      min-height: 48px;
      border-radius: 999px;
      border: 1px solid var(--text);
      background: var(--button-bg);
      color: var(--button-text);
      padding: 0 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 180ms ease, background-color 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .action-button:hover,
    .retry-button:hover:not(:disabled) {
      transform: translateY(-1px);
      background: var(--button-hover);
      color: var(--button-invert);
    }

    .action-button:active,
    .retry-button:active:not(:disabled) {
      transform: translateY(0);
    }

    .completion-card {
      display: grid;
      align-content: center;
      gap: 18px;
      padding: 28px;
      text-align: center;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.015), transparent 28%),
        var(--surface);
      transition: border-color 180ms ease, box-shadow 180ms ease, background-color 180ms ease;
    }

    body.is-dark .completion-card {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 28%),
        var(--surface);
    }

    .completion-kicker {
      margin: 0;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .completion-title {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.2rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
      text-wrap: balance;
    }

    .completion-copy {
      margin: 0 auto;
      max-width: 32ch;
      color: var(--muted);
      line-height: 1.6;
      text-wrap: pretty;
    }

    .completion-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .completion-stat {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 10px;
      background: rgba(255, 255, 255, 0.5);
      transition: border-color 180ms ease, background-color 180ms ease;
    }

    body.is-dark .completion-stat {
      background: rgba(20, 20, 20, 0.72);
    }

    .completion-stat span {
      display: block;
    }

    .completion-stat-label {
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .completion-stat-value {
      margin-top: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.22rem;
      font-weight: 600;
    }

    .retry-button {
      justify-self: center;
      min-width: 220px;
    }

    .retry-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .progress-track {
      width: min(92vw, 480px);
      height: 4px;
      border-radius: 999px;
      background: var(--progress-track);
      overflow: hidden;
      transition: background-color 180ms ease;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--progress-fill);
      transition: width 400ms var(--ease-main), background-color 180ms ease;
    }

    .footer {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      padding-bottom: 4px;
    }

    .count-pill {
      min-width: 138px;
      min-height: 52px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--pill);
      box-shadow: var(--shadow);
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 16px;
      transition: border-color 180ms ease, background-color 180ms ease, box-shadow 180ms ease;
      transform: scale(1);
    }

    .count-pill.is-pulsing {
      animation: count-pulse 200ms ease;
    }

    .count-label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .count-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1rem;
      font-weight: 600;
    }

    [hidden] {
      display: none !important;
    }

        @keyframes actions-rise {
          0% {
            opacity: 0;
        transform: translateY(16px) scale(0.96);
      }
      72% {
        opacity: 1;
        transform: translateY(-2px) scale(1.02);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

        @keyframes count-pulse {
          0% {
            transform: scale(1);
      }
      50% {
        transform: scale(1.15);
      }
          100% {
            transform: scale(1);
          }
        }

        @keyframes theme-spin {
          from {
            transform: rotate(0deg);
          }
          to {
            transform: rotate(360deg);
          }
        }

    @media (max-width: 760px) {
      .topbar {
        grid-template-columns: 1fr auto;
        grid-template-areas:
          'brand toggle'
          'progress progress';
      }

      .brand {
        grid-area: brand;
      }

      .progress-meta {
        grid-area: progress;
      }

      .topbar-actions {
        grid-area: toggle;
      }

      .controls {
        align-items: stretch;
      }

      .filter-group {
        width: 100%;
      }

      .filter-chip {
        flex: 1 1 140px;
        text-align: center;
      }

      .completion-card,
      .card-shell {
        width: min(94vw, 520px);
      }
    }

    @media (max-width: 560px) {
      .app {
        padding: 18px;
      }

      .card-shell,
      .completion-card {
        min-height: 340px;
        border-radius: 24px;
      }

      .card-face {
        padding: 20px 20px 24px;
      }

      .card-back {
        padding-bottom: 104px;
      }

      .term {
        max-width: 11ch;
      }

      .completion-stats {
        grid-template-columns: 1fr;
      }

      .card-actions {
        grid-template-columns: 1fr;
      }

      .action-button,
      .retry-button {
        width: 100%;
      }

      .count-pill {
        width: min(100%, 240px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">AP Psych</div>
      <div class="progress-meta" aria-live="polite">
        <span class="progress-count" id="progressCount">0 / 0</span>
        <span class="progress-scope" id="progressScope">All units</span>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode" aria-pressed="false">
          <span class="theme-icon" aria-hidden="true"></span>
        </button>
      </div>
    </header>

    <div class="controls" aria-label="Study controls">
      <div class="filter-group" id="filterGroup" role="toolbar" aria-label="Filter flashcards by unit">
        <button class="filter-chip is-active" type="button" data-unit="All">All</button>
        <button class="filter-chip" type="button" data-unit="Biological Bases of Behavior">Biological Bases</button>
        <button class="filter-chip" type="button" data-unit="Cognition">Cognition</button>
        <button class="filter-chip" type="button" data-unit="Development &amp; Learning">Development &amp; Learning</button>
        <button class="filter-chip" type="button" data-unit="Social Psychology &amp; Personality">Social &amp; Personality</button>
        <button class="filter-chip" type="button" data-unit="Mental &amp; Physical Health">Mental &amp; Physical Health</button>
      </div>
      <button class="skip-link" id="skipButton" type="button">Skip</button>
    </div>

    <main class="stage">
      <div class="stage-frame">
        <div class="card-shell" id="cardShell">
              <div class="flashcard" id="flashcard" role="button" tabindex="0" aria-label="Flashcard">
                <section class="card-face card-front" id="frontFace" aria-hidden="false">
              <div class="face-top">
                <span class="unit-badge" id="frontUnitBadge">All</span>
                <span class="face-kicker">Front</span>
              </div>
              <div class="term-wrap">
                <h1 class="term" id="termText"></h1>
              </div>
              <div class="face-foot">
                <span class="flip-prompt">Tap to reveal</span>
              </div>
            </section>

ific Method","definition":"Systematic procedure of gathering data and testing hypotheses.","hint":"Step-by-step discovery","unit":"Cognition"},{"term":"Confirmation Bias","definition":"Favoring information that confirms your beliefs.","hint":"Seeing what you believe","unit":"Cognition"},{"term":"Hindsight Bias","definition":"Believing events were predictable after they happened.","hint":"I knew it all along","unit":"Cognition"},{"term":"Overconfidence","definition":"Overestimating the accuracy of knowledge and judgments.","hint":"Too sure to be sure","unit":"Cognition"},{"term":"Hypothesis","definition":"A testable prediction, often derived from a theory.","hint":"Educated guess","unit":"Cognition"},{"term":"Falsifiable","definition":"Capable of being proven wrong.","hint":"Can be challenged","unit":"Cognition"},{"term":"Peer Review","definition":"Evaluation of work by others in the same field.","hint":"Colleague check-up","unit":"Cognition"},{"term":"Replication","definition":"Repeating a study to test its findings.","hint":"Do it again","unit":"Cognition"},{"term":"Reliability","definition":"Consistency of measurement.","hint":"Consistently consistent","unit":"Cognition"},{"term":"Validity","definition":"Accuracy of a test in measuring what it is supposed to measure.","hint":"Accurately accurate","unit":"Cognition"},{"term":"The American Psychological Association (APA)","definition":"Leading scientific and professional organization representing psychology in the US.","hint":"Psychology's rule-maker","unit":"Cognition"},{"term":"Quantitative Data","definition":"Data that can be quantified and verified, and is susceptible to statistical manipulation.","hint":"Numbers tell the tale","unit":"Cognition"},{"term":"Qualitative Data","definition":"Descriptive data which can be observed but not measured.","hint":"Stories, not statistics","unit":"Cognition"},{"term":"Likert Scales","definition":"Scale used to represent people's attitudes to a topic.","hint":"Agree to disagree","unit":"Cognition"},{"term":"Structured Interviews","definition":"Interviews following a set sequence of questions.","hint":"Scripted Q&A","unit":"Cognition"},{"term":"Survey Technique","definition":"Research method involving asking questions to gather data.","hint":"Ask to know","unit":"Cognition"},{"term":"Wording Effect","definition":"Changes in responses caused by word choices in questions.","hint":"Words sway","unit":"Cognition"},{"term":"Social Desirability Bias","definition":"A tendency to give socially approved answers.","hint":"Looking good","unit":"Cognition"},{"term":"Naturalistic Observation","definition":"Observing subjects in their natural environment.","hint":"Real-world watching","unit":"Cognition"},{"term":"Case Study","definition":"Study of a single subject or group in detail.","hint":"Focus on one","unit":"Cognition"},{"term":"Correlational Research","definition":"Research determining the relationship between variables.","hint":"Correlation-relationship","unit":"Cognition"},{"term":"Third Variable Problem","definition":"A confounding variable that influences both variables of interest.","hint":"Hidden influencer","unit":"Cognition"},{"term":"Correlation Coefficient","definition":"Numerical measure of the type and degree of the relationship between two variables.","hint":"Relationship strength meter","unit":"Cognition"},{"term":"Positive Correlation","definition":"When variables increase or decrease together.","hint":"Together upward","unit":"Cognition"},{"term":"Negative Correlation","definition":"One variable increases as the other decreases.","hint":"Opposite directions","unit":"Cognition"},{"term":"Experimental Method","definition":"Method involving manipulation and controlled testing of variables.","hint":"Controlled experiment","unit":"Cognition"},{"term":"Independent Variable","definition":"Variable that is manipulated in an experiment.","hint":"Cause","unit":"Cognition"},{"term":"Dependent Variable","definition":"Variable that is measur "Availability increaser","unit":"Biological Bases of Behavior"},{"term":"Stimulants","definition":"Drugs that excite neural activity, speeding up body functions.","hint":"Speed up","unit":"Biological Bases of Behavior"},{"term":"Caffeine","definition":"A mild stimulant found in coffee, tea, and many sodas.","hint":"Energy booster","unit":"Biological Bases of Behavior"},{"term":"Cocaine","definition":"A powerful and addictive stimulant derived from the coca plant.","hint":"Intense stimulant","unit":"Biological Bases of Behavior"},{"term":"Depressants","definition":"Substances that reduce neural activity and slow body functions.","hint":"Slow down","unit":"Biological Bases of Behavior"},{"term":"Alcohol","definition":"A depressant that is the intoxicating ingredient in whiskey, beer, wine, and other fermented or distilled liquors.","hint":"Common relaxant","unit":"Biological Bases of Behavior"},{"term":"Memory Consolidation","definition":"The neural storage of a long-term memory.","hint":"Memory storage","unit":"Biological Bases of Behavior"},{"term":"Restoration of Resources","definition":"Theory that sleep provides an essential time for the body to repair and rejuvenate itself.","hint":"Body refresh","unit":"Biological Bases of Behavior"},{"term":"Insomnia","definition":"Difficulty in falling or staying asleep.","hint":"Sleep struggle","unit":"Biological Bases of Behavior"},{"term":"Narcolepsy","definition":"A sleep disorder characterized by uncontrollable sleep attacks.","hint":"Sleep attacks","unit":"Biological Bases of Behavior"},{"term":"REM Sleep Behavior Disorder","definition":"A sleep disorder in which sufferers physically act out their dreams.","hint":"Dream actor","unit":"Biological Bases of Behavior"},{"term":"Sleep Apnea","definition":"A sleep disorder characterized by temporary cessations of breathing during sleep.","hint":"Breathing pauses","unit":"Biological Bases of Behavior"},{"term":"Somnambulism","definition":"Otherwise known as sleepwalking, occurring during deep sleep.","hint":"Sleepwalking","unit":"Biological Bases of Behavior"},{"term":"Sleep Cycle Progression","definition":"As the night progresses, NREM-3 stages shorten and REM stages lengthen, particularly in the second half of the night.","hint":"","unit":"Biological Bases of Behavior"},{"term":"Hallucinogens","definition":"Psychedelic drugs that distort perceptions and evoke sensory images without sensory input.","hint":"Perception changer","unit":"Biological Bases of Behavior"},{"term":"Marijuana","definition":"A drug derived from the cannabis plant that produces a mix of hallucinogenic, depressant, and stimulant effects.","hint":"Mixed-effect drug","unit":"Biological Bases of Behavior"},{"term":"Opioids","definition":"A category of drugs that includes heroin and prescription painkillers that are derived from opium.","hint":"Pain reliever","unit":"Biological Bases of Behavior"},{"term":"Heroin","definition":"A narcotic drug derived from morphine, extremely addictive.","hint":"Highly addictive painkiller","unit":"Biological Bases of Behavior"},{"term":"Tolerance","definition":"The diminishing effect with regular use of the same dose of a drug, requiring the user to take larger doses.","hint":"Needing more","unit":"Biological Bases of Behavior"},{"term":"Addiction","definition":"Compulsive craving of drugs or certain behaviors despite known adverse consequences.","hint":"Compulsive need","unit":"Biological Bases of Behavior"},{"term":"Withdrawal","definition":"The discomfort and distress that follow discontinuing an addictive drug or behavior.","hint":"Discomfort post-cessation","unit":"Biological Bases of Behavior"},{"term":"Synesthesia","definition":"The perceptual phenomenon in which stimulation of one sensory or cognitive pathway leads to automatic, involuntary experiences in a second sensory or cognitive pathway.","hint":"Senses crossover","unit":"Biological Bases of Behavior"},{"term":"Retina","definition":"The light-sensitive inner surface of the eye, containing receptor rods and cones plus layers of other neurons that process visual information.","hint":"Image processor","unit":"Biological Bases of Behavior"},{"term":"Blind Spot","definition":"The point at which the optic nerve leaves the eye, creating a \"blind\" spot because no receptor cells are located there.","hint":"Sight gap","unit":"Biological Bases of Behavior"},{"term":"Visual Nerve","definition":"The optic nerve that carries neural impulses from the eye to the brain.","hint":"Vision cable","unit":"Biological Bases of Behavior"},{"term":"Lens","definition":"The transparent structure behind the pupil that changes shape to help focus images on the retina.","hint":"Focus adjuster","unit":"Biological Bases of Behavior"},{"term":"Accommodation","definition":"The process by which the eye's lens changes shape to focus near or far objects on the retina.","hint":"Focusing process","unit":"Biological Bases of Behavior"},{"term":"Nearsightedness","definition":"A condition in which nearby objects are seen more clearly than distant objects because distant objects focus in front of the retina.","hint":"Close vision clarity","unit":"Biological Bases of Behavior"},{"term":"Sensation","definition":"The process by which our sensory receptors and nervous system receive stimulus energies from our environment.","hint":"Sensory input","unit":"Biological Bases of Behavior"},{"term":"Transduction","definition":"Conversion of one form of energy into another. In sensation, transforming stimulus energies into neural impulses.","hint":"Energy conversion","unit":"Biological Bases of Behavior"},{"term":"Perception","definition":"The process of organizing and interpreting sensory information, enabling us to recognize meaningful objects and events.","hint":"Interpreting senses","unit":"Biological Bases of Behavior"},{"term":"Absolute Threshold","definition":"The minimum stimulus energy needed to detect a particular stimulus 50 percent of the time.","hint":"Detection baseline","unit":"Biological Bases of Behavior"},{"term":"Just-noticeable Difference","definition":"The minimal change in a stimulus that can just barely be detected.","hint":"Minimal detectable change","unit":"Biological Bases of Behavior"},{"term":"Sensory Adaptation","definition":"Diminished sensitivity as a consequence of constant stimulation.","hint":"Getting used to it","unit":"Biological Bases of Behavior"},{"term":"Weber's Law","definition":"The principle that to be perceived as different, two stimuli must differ by a constant minimum percentage.","hint":"Relative difference","unit":"Biological Bases of Behavior"},{"term":"Farsightedness","definition":"A condition in which faraway objects are seen more clearly than near objects because the image of near objects is focused behind the retina.","hint":"Distance vision clarity","unit":"Cognition"},{"term":"Photoreceptors","definition":"Rods and cones located in the retina that convert light energy into neural signals.","hint":"Light detectors","unit":"Cognition"},{"term":"Rods","definition":"Retinal receptors that detect black, white, and gray; necessary for peripheral and twilight vision, when cones don't respond.","hint":"Low-light helpers","unit":"Cognition"},{"term":"Cones","definition":"Retinal receptor cells that are concentrated near the center of the retina and that function in daylight or in well-lit conditions. The cones detect fine detail and give rise to color sensations.","hint":"Color and detail detectors","unit":"Cognition"},{"term":"Trichromatic Theory","definition":"Theory stating that the retina contains three different color receptors-one most sensitive to red, one to green, one to blue-which, when stimulated in combination, can produce the perception of any color.","hint":"RGB color mixing","unit":"Cognition"},{"term":"Opponent-Process Theory","definition":"Theory that opposing retinal processes enable color vision (e.g., red-green, yellow-blue, white-black).","hint":"Color opposites","unit":"Cognition"},{"term":"Pitch","definition":"A tone's experienced highness or lowness; depends on frequency.","hint":"Tone height","unit":"Cognition"},{"term":"Amplitude","definition":"The height of a wave's crest, which affects perceived loudness in sounds.","hint":"Sound strength","unit":"Cognition"},{"term":"Loudness","definition":"The intensity of a sound wave, which humans perceive as volume.","hint":"How loud","unit":"Cognition"},{"term":"Pitch Perception","definition":"How high or low a sound is perceived, which is related to the frequency of the sound wave.","hint":"Hearing high-low","unit":"Cognition"},{"term":"Place Theory","definition":"Theory that links the pitch we hear with the place where the cochlea's membrane is stimulated.","hint":"Pitch place","unit":"Cognition"},{"term":"Volley Theory","definition":"The theory that relates the frequency of a sound to the pulsing of the auditory neurons.","hint":"Pulse matching","unit":"Cognition"},{"term":"Frequency Theory","definition":"Theory stating that the rate of nerve impulses traveling up the auditory nerve matches the frequency of a tone, allowing us to sense pitch.","hint":"Frequency matching","unit":"Cognition"},{"term":"Sound Localization","definition":"The ability to determine the origin of a sound in space.","hint":"Where's that sound","unit":"Cognition"},{"term":"Fovea","definition":"The central focal point in the retina, around which the eye's cones cluster.","hint":"Visual focus","unit":"Cognition"},{"term":"Afterimages","definition":"Visual illusions that occur after the initial visual stimulus has been removed, typically when staring at a colored image then looking away.","hint":"Color ghosts","unit":"Cognition"},{"term":"Ganglion Cells","definition":"Neurons in the retina that connect to the bipolar cells; their axons form the optic nerve.","hint":"Visual messengers","unit":"Cognition"},{"term":"Dichromatism","definition":"A form of color blindness characterized by the inability to see one or more colors.","hint":"Limited color vision","unit":"Cognition"},{"term":"Monochromatism","definition":"A rare form of color blindness where individuals cannot see any color, only shades of gray.","hint":"All-gray vision","unit":"Cognition"},{"term":"Prosopagnosia","definition":"An inability to recognize the faces of familiar people, typically as a result of damage to the brain.","hint":"Face blindness","unit":"Cognition"},{"term":"Blindsight","definition":"A condition in which a person can respond to a visual stimulus without consciously experiencing it.","hint":"Unseen seeing","unit":"Cognition"},{"term":"Wavelength","definition":"The distance between successive peaks of a wave, typically used in the context of electromagnetic waves.","hint":"Light wave distance","unit":"Cognition"},{"term":"Conduction Deafness","definition":"Hearing loss caused by damage to the mechanical system that conducts sound waves to the cochlea.","hint":"Mechanical hearing loss","unit":"Cognition"},{"term":"Sensorineural Deafness","definition":"Hearing loss caused by damage to the cochlea's receptor cells or to the auditory nerves.","hint":"Nerve-related hearing loss","unit":"Cognition"},{"term":"Olfactory System","definition":"The sensory system used for smelling.","hint":"Smell system","unit":"Cognition"},{"term":"Thalamus","definition":"The brain's sensory switchboard, located on top of the brainstem; directs messages to the sensory receiving areas in the cortex and transmits replies to the cerebellum and medulla.","hint":"Sensory director","unit":"Cognition"},{"term":"Pheromones","definition":"Chemical signals released by an animal that communicate information and affect the behavior of other animals of the same species.","hint":"Chemical communication","unit":"Cognition"},{"term":"Gustation","definition":"The sensation of taste.","hint":"Tasting","unit":"Cognition"},{"term":"Taste Receptors","definition":"Sensory receptors on the tongue that detect the chemical molecules that enable taste.","hint":"Taste detectors","unit":"Cognition"},{"term":"Semicircular Canals","definition":"Structures in the ear involved in maintaining balance.","hint":"Balance loops","unit":"Cognition"},{"term":"Kinesthesis","definition":"The system for sensing the position and movement of individual body parts.","hint":"Movement sense","unit":"Cognition"},{"term":"Perception","definition":"Interpretation of sensory input.","hint":"Reality interpretation","unit":"Cognition"},{"term":"Bottom-up Processing","definition":"Analysis starting with the sensory receptors and works up to the brain's integration of sensory information.","hint":"Details first","unit":"Cognition"},{"term":"Top-down Processing","definition":"Information processing guided by higher-level mental processes, drawing on our experiences and expectations.","hint":"Expectation driven","unit":"Cognition"},{"term":"Schema","definition":"Framework that organizes and interprets information.","hint":"Mental blueprint","unit":"Cognition"},{"term":"Perceptual Set","definition":"A mental predisposition to perceive one thing and not another.","hint":"Expectation bias","unit":"Cognition"},{"term":"Gestalt Psychology","definition":"An approach emphasizing that the whole of anything is greater than its parts.","hint":"Whole over parts","unit":"Cognition"},{"term":"Supertasters","definition":"Individuals who have more taste buds than average and can taste flavors more intensely.","hint":"Intense tasters","unit":"Cognition"},{"term":"Medium Tasters","definition":"Individuals with an average number of taste buds, experiencing average intensity of flavors.","hint":"Average tasters","unit":"Cognition"},{"term":"Nontasters","definition":"Individuals who have fewer taste buds than average and taste flavors less intensely.","hint":"Mild tasters","unit":"Cognition"},{"term":"Sensory Interaction","definition":"The principle that one sense may influence another, as when the smell of food influences its taste.","hint":"Senses mix","unit":"Cognition"},{"term":"Warm/Cold Receptors","definition":"Sensory receptors in the skin that respond to temperature changes.","hint":"Temp detectors","unit":"Cognition"},{"term":"Pain","definition":"The body's response to harmful stimuli, indicating potential or actual injury.","hint":"Hurt alert","unit":"Cognition"},{"term":"Gate Control Theory","definition":"The theory that the spinal cord contains a neurological \"gate\" that blocks pain signals or allows them to pass on to the brain.","hint":"Pain gatekeeper","unit":"Cognition"},{"term":"Phantom Limb","definition":"The sensation that an amputated or missing limb is still attached, often causing pain.","hint":"Missing part feels","unit":"Cognition"},{"term":"Vestibular Sense","definition":"The sense of body movement and position, including the sense of balance.","hint":"Balance sense","unit":"Cognition"},{"term":"Closure","definition":"The perceptual tendency to mentally complete incomplete figures.","hint":"Filling the gaps","unit":"Cognition"},{"term":"Figure and Ground","definition":"Organizing the visual field into objects (figures) that stand out from their surroundings (ground).","hint":"Focus vs. background","unit":"Cognition"},{"term":"Proximity","definition":"Grouping nearby figures together.","hint":"Near means together","unit":"Cognition"},{"term":"Similarity","definition":"Grouping similar figures together.","hint":"Alike means together","unit":"Cognition"},{"term":"Attention","definition":"Focusing awareness on a narrowed range of stimuli or events.","hint":"Focus spotlight","unit":"Cognition"},{"term":"Selective Attention","definition":"The focusing of conscious awareness on a particular stimulus.","hint":"Choosing focus","unit":"Cognition"},{"term":"Cocktail Party Effect","definition":"Ability to attend to only one voice among many.","hint":"Focus in noise","unit":"Cognition"},{"term":"Inattentional Blindness","definition":"Failing to see visible objects when our attention is directed elsewhere.","hint":"Unseen when distracted","unit":"Cognition"},{"term":"Change Blindness","definition":"Failing to notice changes in the environment.","hint":"Unnoticed changes","unit":"Cognition"},{"term":"Perceptual Constancies","definition":"Perceiving objects as unchanging even as illumination and retinal images change.","hint":"Consistent perception","unit":"Cognition"},{"term":"Apparent Movement","definition":"The perception that a stationary object is moving.","hint":"Illusion of motion","unit":"Cognition"},{"term":"Prototypes","definition":"A mental image or best example of a category.","hint":"Best example","unit":"Cognition"},{"term":"Schemas","definition":"Categories of information stored in the memory.","hint":"Information folders","unit":"Cognition"},{"term":"Assimilation","definition":"Incorporating new experiences into our current understanding (schema).","hint":"Adding to existing","unit":"Cognition"},{"term":"Accommodation","definition":"Adjusting a schema to incorporate new information.","hint":"Updating framework","unit":"Cognition"},{"term":"Algorithms","definition":"Step-by-step procedures that guarantee a solution.","hint":"Fail-proof method","unit":"Cognition"},{"term":"Heuristics","definition":"Shortcuts or rules of thumb for problem-solving; faster than algorithms but not guaranteed to work.","hint":"Quick guess","unit":"Cognition"},{"term":"Representativeness Heuristic","definition":"Judging likelihood based on how well an example represents a specific category.","hint":"Stereotype guess","unit":"Cognition"},{"term":"Binocular Depth Cues","definition":"Depth cues that depend on the use of two eyes.","hint":"Two-eye depth","unit":"Cognition"},{"term":"Retinal Disparity","definition":"A binocular cue for perceiving depth; by comparing images from the retinas in the two eyes, the brain computes distance.","hint":"Eyes' view difference","unit":"Cognition"},{"term":"Convergence","definition":"A binocular cue for perceiving depth; the extent to which the eyes converge inward when looking at an object.","hint":"Eyes converge","unit":"Cognition"},{"term":"Monocular Depth Cues","definition":"Depth cues available to either eye alone.","hint":"One-eye depth","unit":"Cognition"},{"term":"Relative Clarity","definition":"A monocular cue for perceiving depth; hazy objects are farther away than sharp, clear objects.","hint":"Fuzzy is far","unit":"Cognition"},{"term":"Relative Size","definition":"A monocular cue that smaller objects are perceived as more distant.","hint":"Smaller is farther","unit":"Cognition"},{"term":"Texture Gradient","definition":"A gradual change from coarse, distinct texture to fine, indistinct texture signals increasing distance.","hint":"Rough close, smooth far","unit":"Cognition"},{"term":"Linear Perspective","definition":"Parallel lines appear to converge with distance.","hint":"Lines meet with distance","unit":"Cognition"},{"term":"Interposition","definition":"If one object partially blocks our view of another, we perceive it as closer.","hint":"Blocking view means closer","unit":"Cognition"},{"term":"Availability Heuristic","definition":"Estimating the likelihood of events based on their availability in memory; if instances come readily to mind, we presume such events are common.","hint":"Memory-based guess","unit":"Cognition"},{"term":"Mental Set","definition":"A tendency to approach situations in a certain way because that method worked in the past.","hint":"Fixed approach","unit":"Cognition"},{"term":"Priming","definition":"The activation, often unconsciously, of particular associations in memory.","hint":"Memory trigger","unit":"Cognition"},{"term":"Framing","definition":"The way an issue is posed; framing can significantly affect decisions and judgments.","hint":"Perspective spin","unit":"Cognition"},{"term":"Gambler's Fallacy","definition":"The belief that the odds of a chance event increase if the event hasn't occurred recently.","hint":"Misguided luck belief","unit":"Cognition"},{"term":"Sunk-Cost Fallacy","definition":"The tendency to continue an endeavor once an investment in money, effort, or time has been made.","hint":"Throwing good after bad","unit":"Cognition"},{"term":"Divergent Thinking","definition":"A type of creative thinking in which one generates new solutions to problems.","hint":"Out-of-the-box thoughts","unit":"Cognition"},{"term":"Convergent Thinking","definition":"A type of critical thinking in which one focuses on finding a single, correct answer.","hint":"Narrowing down","unit":"Cognition"},{"term":"Standardization","definition":"Ensuring that the conditions for administering a test are the same for all participants, so that scores are comparable.","hint":"Uniform conditions","unit":"Cognition"},{"term":"Validity","definition":"The extent to which a test measures or predicts what it is supposed to.","hint":"Accuracy of measurement","unit":"Cognition"},{"term":"Construct Validity","definition":"The extent to which a test measures the theoretical construct it is intended to measure.","hint":"Theory alignment","unit":"Cognition"},{"term":"Predictive Validity","definition":"The success with which a test predicts the behavior it is designed to predict; it is assessed by computing the correlation between test scores and the criterion behavior.","hint":"Future behavior predictor","unit":"Cognition"},{"term":"Reliability","definition":"The extent to which a test yields consistent results, as assessed by the consistency of scores on two halves of the test, on alternate forms, or on retesting.","hint":"Consistency of scores","unit":"Cognition"},{"term":"Test-Retest Reliability","definition":"The consistency of scores on a test over time.","hint":"Score stability","unit":"Cognition"},{"term":"Split-Half Reliability","definition":"The extent to which all parts of the test contribute equally to what is being measured.","hint":"Internal consistency","unit":"Cognition"},{"term":"Functional Fixedness","definition":"The tendency to perceive the functions of objects as fixed and unchanging.","hint":"Limited use view","unit":"Cognition"},{"term":"Testing Effect","definition":"Enhanced memory after retrieving, rather than simply rereading, information.","hint":"Quiz yourself benefit","unit":"Cognition"},{"term":"Metacognition","definition":"Thinking about thinking; awareness and understanding of one's own thought processes.","hint":"Self-reflection on thinking","unit":"Cognition"},{"term":"Intelligence","definition":"The ability to learn from experience, solve problems, and use knowledge to adapt to new situations.","hint":"Problem-solving ability","unit":"Cognition"},{"term":"g (General Intelligence)","definition":"A factor that underlies specific mental abilities and is measured by every task on an intelligence test.","hint":"Overall intelligence","unit":"Cognition"},{"term":"Multiple Intelligence","definition":"Theory proposing that there are different types of intelligences that are independent of one another.","hint":"Varied talents","unit":"Cognition"},{"term":"Intelligence Quotient (IQ)","definition":"A numerical score on an intelligence test, originally computed by dividing one's mental age by one's chronological age and multiplying by 100.","hint":"Intelligence score","unit":"Cognition"},{"term":"Stereotype Threat","definition":"Anxiety that one's behavior might confirm a negative stereotype about one's group.","hint":"Performance anxiety","unit":"Cognition"},{"term":"Stereotype Lift","definition":"Performance improvement that results when threats are removed and individuals are reminded they might outperform others.","hint":"Encouraged potential","unit":"Cognition"},{"term":"Flynn Effect","definition":"The observed rise over time in standardized intelligence test scores.","hint":"IQ score increase","unit":"Cognition"},{"term":"Achievement Tests","definition":"Tests designed to assess what a person has learned.","hint":"Knowledge test","unit":"Cognition"},{"term":"Aptitude Tests","definition":"Tests designed to predict a person's future performance or capacity to learn.","hint":"Potential test","unit":"Cognition"},{"term":"Fixed Mindset","definition":"The belief that abilities are fixed and cannot change.","hint":"Growth limit belief","unit":"Cognition"},{"term":"Growth Mindset","definition":"The belief that abilities can be developed through dedication and hard work.","hint":"Growth potential","unit":"Cognition"},{"term":"Explicit Memory","definition":"Memory of facts and experiences that one can consciously know and declare.","hint":"Conscious memory","unit":"Cognition"},{"term":"Central Executive","definition":"The part of working memory that directs attention and processing.","hint":"Control center","unit":"Cognition"},{"term":"Phonological Loop","definition":"The part of working memory that holds and processes verbal and auditory information.","hint":"Sound storage","unit":"Cognition"},{"term":"Visuospatial Sketchpad","definition":"The part of working memory that holds visual and spatial information.","hint":"Image holder","unit":"Cognition"},{"term":"Multi-store Model","definition":"A memory model that suggests information flows through a series of storage systems.","hint":"Information flow model","unit":"Cognition"},{"term":"Sensory Memory","definition":"The immediate, very brief recording of sensory information in the memory system.","hint":"Instant capture","unit":"Cognition"},{"term":"Iconic Memory","definition":"A brief sensory memory of visual stimuli; a photographic or picture-image memory lasting no more than a few tenths of a second.","hint":"Visual snapshot","unit":"Cognition"},{"term":"Echoic Memory","definition":"A momentary sensory memory of auditory stimuli; if attention is elsewhere, sounds and words can still be recalled within 3 or 4 seconds.","hint":"Sound echo","unit":"Cognition"},{"term":"Short-Term Memory","definition":"A memory system that retains information for limited durations, closely related to working memory.","hint":"Brief storage","unit":"Cognition"},{"term":"Episodic Memory","definition":"The collection of past personal experiences that occurred at a particular time and place.","hint":"Life episodes","unit":"Cognition"},{"term":"Semantic Memory","definition":"Memory for knowledge about the world.","hint":"Fact storage","unit":"Cognition"},{"term":"Implicit Memory","definition":"Retention of learned skills or classically conditioned associations independent of conscious recollection.","hint":"Automatic memory","unit":"Cognition"},{"term":"Procedural Memory","definition":"A type of implicit memory that involves motor skills and behavioral habits.","hint":"Skill memory","unit":"Cognition"},{"term":"Prospective Memory","definition":"Remembering to perform a planned action or recall a planned intention at some future point in time.","hint":"Future task reminder","unit":"Cognition"},{"term":"Long-term Potentiation","definition":"An increase in a synapse's firing potential after brief, rapid stimulation; believed to be a neural basis for learning and memory.","hint":"Neural enhancement","unit":"Cognition"},{"term":"Working Memory","definition":"A newer understanding of short-term memory that involves conscious, active processing of incoming auditory and visual-spatial information, and of information retrieved from long-term memory.","hint":"Active processing zone","unit":"Cognition"},{"term":"Long-Term Memory","definition":"The relatively permanent and limitless storehouse of the memory system, including knowledge, skills, and experiences.","hint":"Permanent storage","unit":"Cognition"},{"term":"Automatic Processing","definition":"Unconscious encoding of incidental information, such as space, time, and frequency, and of well-learned information.","hint":"Effortless entry","unit":"Cognition"},{"term":"Effortful Processing","definition":"Encoding that requires attention and conscious effort.","hint":"Conscious encoding","unit":"Cognition"},{"term":"Encoding","definition":"The processing of information into the memory system-for example, by extracting meaning.","hint":"Memory input","unit":"Cognition"},{"term":"Storage","definition":"The retention of encoded information over time.","hint":"Information keeper","unit":"Cognition"},{"term":"Retrieval","definition":"The process of getting information out of memory storage.","hint":"Memory access","unit":"Cognition"},{"term":"Levels of Processing Model","definition":"Theory that deeper levels of processing result in longer-lasting memory codes.","hint":"Deep processing advantage","unit":"Cognition"},{"term":"Shallow Encoding","definition":"Encoding on a basic level based on the structure or appearance of words.","hint":"Surface level","unit":"Cognition"},{"term":"Deep Encoding","definition":"Encoding semantically, based on the meaning of the words; tends to yield the best retention.","hint":"Meaning level","unit":"Cognition"},{"term":"Serial Position Effect","definition":"Our tendency to recall best the last (recency effect) and first items (primacy effect) in a list.","hint":"Beginning and end recall","unit":"Cognition"},{"term":"Primacy Effect","definition":"Enhanced recall of items at the beginning of a list.","hint":"First better remembered","unit":"Cognition"},{"term":"Recency Effect","definition":"Enhanced recall of items at the end of a list.","hint":"Last better remembered","unit":"Cognition"},{"term":"Maintenance Rehearsal","definition":"Repeating information over and over to keep it active in short-term memory.","hint":"Repeat to keep","unit":"Cognition"},{"term":"Elaborative Rehearsal","definition":"A memory technique that involves thinking about the meaning of the term to be remembered, as opposed to simply repeating the word to yourself.","hint":"Deeply process","unit":"Cognition"},{"term":"Memory Retention","definition":"The ability to retain information over time through the storage and retrieval of information.","hint":"Keeping information","unit":"Cognition"},{"term":"Autobiographical Memory","definition":"Memory system consisting of episodes recollected from an individual's life, based on a combination of episodic (personal experiences) and semantic (general knowledge and facts) memory.","hint":"Personal life history","unit":"Cognition"},{"term":"Retrograde Amnesia","definition":"An inability to retrieve information from one's past.","hint":"Lost past memories","unit":"Cognition"},{"term":"Anterograde Amnesia","definition":"An inability to form new memories.","hint":"Can't make new memories","unit":"Cognition"},{"term":"Mnemonic Devices","definition":"Memory aids, especially techniques that use vivid imagery and organizational devices.","hint":"Memory helpers","unit":"Cognition"},{"term":"Method of Loci","definition":"A mnemonic device that involves imagining placing items you want to remember along a familiar path.","hint":"Memory walk","unit":"Cognition"},{"term":"Chunking-Grouping","definition":"Organizing items into familiar, manageable units to make them easier to remember.","hint":"Data bundling","unit":"Cognition"},{"term":"Categories-Grouping","definition":"Sorting information into logical groupings to improve recall.","hint":"Logical sorting","unit":"Cognition"},{"term":"Hierarchies-Grouping","definition":"Arranging information in a structured order from broad to specific or vice versa.","hint":"Structured layers","unit":"Cognition"},{"term":"Spacing Effect","definition":"The tendency for distributed study or practice to yield better long-term retention than massed practice or study.","hint":"Spread learning","unit":"Cognition"},{"term":"Memory Consolidation","definition":"The process by which memories become stable in the brain, typically occurring during sleep.","hint":"Memory stabilization","unit":"Cognition"},{"term":"Massed Practice","definition":"Cramming information all at once. It is less effective than spacing the information out over time.","hint":"Cramming","unit":"Cognition"},{"term":"Distributed Practice","definition":"Spreading out study sessions over time with breaks in between.","hint":"Spaced learning","unit":"Cognition"},{"term":"Alzheimer's Disease","definition":"A progressive and irreversible brain disorder characterized by gradual deterioration of memory, reasoning, language, and, finally, physical functioning.","hint":"Progressive memory loss","unit":"Cognition"},{"term":"Infantile Amnesia","definition":"The inability to retrieve memories from much before age 3.","hint":"Early childhood memory gap","unit":"Cognition"},{"term":"Retrieval","definition":"The process of getting information out of memory storage.","hint":"Accessing stored data","unit":"Cognition"},{"term":"Recall","definition":"Retrieving information that is not currently in your conscious awareness but that was learned at an earlier time.","hint":"Retrieve from memory","unit":"Cognition"},{"term":"Recognition","definition":"Identifying items previously learned.","hint":"Identify known information","unit":"Cognition"},{"term":"Retrieval Cues","definition":"Stimuli that help you retrieve a certain memory.","hint":"Memory triggers","unit":"Cognition"},{"term":"Context-dependent Memory","definition":"The theory that information learned in a particular situation or place is better remembered when in that same situation or place.","hint":"Environment-linked memory","unit":"Cognition"},{"term":"Mood-congruent Memory","definition":"The tendency to recall experiences that are consistent with one's current mood.","hint":"Mood matches memory","unit":"Cognition"},{"term":"Misinformation Effect","definition":"Incorporating misleading information into one's memory of an event.","hint":"Altered memory","unit":"Cognition"},{"term":"Source Amnesia","definition":"Attributing to the wrong source an event we have experienced, heard about, read about, or imagined.","hint":"Forgotten origin","unit":"Cognition"},{"term":"Constructive Memory","definition":"Memory that utilizes knowledge and expectations to fill in the missing details in retrieved memory traces.","hint":"Memory with gaps filled","unit":"Cognition"},{"term":"Memory Consolidation","definition":"The neural process by which encoded information becomes stored in memory.","hint":"Strengthening memory","unit":"Cognition"},{"term":"Imagination Inflation","definition":"The increased confidence in a false memory of an event following repeated imagination of the event.","hint":"False memory boost","unit":"Cognition"},{"term":"Behavioral Perspective","definition":"Focuses on observable behaviors and what one can do to bring about behavior changes.","hint":"Behavior modification focus","unit":"Cognition"},{"term":"State-dependent Memory","definition":"The theory that information learned in a particular state of mind (e.g., intoxicated, depressed) is more easily recalled when in that same state of mind.","hint":"Mindset-linked memory","unit":"Cognition"},{"term":"The Forgetting Curve","definition":"A graph showing retention and forgetting over time.","hint":"Memory decline graph","unit":"Cognition"},{"term":"Encoding Failure","definition":"The brain's occasional failure to create a memory link.","hint":"Failed memory creation","unit":"Cognition"},{"term":"Proactive Interference","definition":"The disruptive effect of prior learning on the recall of new information.","hint":"Old blocks new","unit":"Cognition"},{"term":"Retroactive Interference","definition":"The disruptive effect of new learning on the recall of old information.","hint":"New blocks old","unit":"Cognition"},{"term":"Tip-of-the-tongue Phenomenon","definition":"The temporary inability to recall information that one feels is just out of reach.","hint":"Almost remembered","unit":"Cognition"},{"term":"Repression","definition":"The basic defense mechanism that banishes from consciousness anxiety-arousing thoughts, feelings, and memories.","hint":"Subconscious hiding","unit":"Cognition"},{"term":"Associative Learning","definition":"Learning that certain events occur together. The events may be two stimuli or a response and its consequences.","hint":"Connections learning","unit":"Development & Learning"},{"term":"Habituation (Non-Associative Learning)","definition":"Learning to decrease responses to a stimulus after repeated presentations.","hint":"Response reduction","unit":"Development & Learning"},{"term":"Classical Conditioning","definition":"A type of learning where a stimulus gains the power to cause a response because it predicts another stimulus that already produces that response.","hint":"Associations","unit":"Development & Learning"},{"term":"Unconditioned Stimulus (UCS)","definition":"In classical conditioning, a stimulus that unconditionally-naturall y and automatically-triggers a response.","hint":"Automatic trigger","unit":"Development & Learning"},{"term":"Unconditioned Response (UR)","definition":"In classical conditioning, the unlearned, naturally occurring response to the unconditioned stimulus.","hint":"Automatic response","unit":"Development & Learning"},{"term":"Conditioned Stimulus (CS)","definition":"In classical conditioning, an originally irrelevant stimulus that, after association with an unconditioned stimulus, comes to trigger a conditioned response.","hint":"Learned trigger","unit":"Development & Learning"},{"term":"Conditioned Response (CR)","definition":"In classical conditioning, the learned response to a previously neutral but now conditioned stimulus.","hint":"Learned response","unit":"Development & Learning"},{"term":"Acquisition","definition":"The initial stage in classical conditioning; the phase associating a neutral stimulus with an unconditioned stimulus so that the neutral stimulus comes to elicit a conditioned response.","hint":"Learning phase","unit":"Development & Learning"},{"term":"Extinction","definition":"The diminishing of a conditioned response; occurs in classical conditioning when an unconditioned stimulus does not follow a conditioned stimulus.","hint":"Response fading","unit":"Development & Learning"},{"term":"Spontaneous Recovery","definition":"The reappearance, after a pause, of an extinguished conditioned response.","hint":"Response return","unit":"Development & Learning"},{"term":"Stimulus Discrimination","definition":"In classical conditioning, the learned ability to distinguish between a conditioned stimulus and stimuli that do not signal an unconditioned stimulus.","hint":"Differentiation learning","unit":"Development & Learning"},{"term":"Stimulus Generalization","definition":"The tendency, once a response has been conditioned, for stimuli similar to the conditioned stimulus to elicit similar responses.","hint":"Response expansion","unit":"Development & Learning"},{"term":"Higher-Order Conditioning","definition":"A procedure in which the conditioned stimulus in one conditioning experience is paired with a new neutral stimulus, creating a second (often weaker) conditioned stimulus.","hint":"Complex conditioning","unit":"Development & Learning"},{"term":"Counterconditioning","definition":"A behavior therapy procedure that conditions new responses to stimuli that trigger unwanted behaviors; based on classical conditioning.","hint":"Response replacement","unit":"Development & Learning"},{"term":"Taste Aversion","definition":"A learned avoidance of a particular food.","hint":"Food dislike learning","unit":"Development & Learning"},{"term":"One-Trial Conditioning","definition":"Conditioning that occurs with only one pairing of the conditioned and unconditioned stimuli.","hint":"Quick learning","unit":"Development & Learning"},{"term":"Biological Preparedness","definition":"A propensity for learning particular kinds of associations over others.","hint":"Innate learning ease","unit":"Development & Learning"},{"term":"Operant Conditioning","definition":"A type of learning in which behavior is strengthened if followed by a reinforcer or diminished if followed by a punisher.","hint":"Behavior consequences","unit":"Development & Learning"},{"term":"The Law of Effect","definition":"Thorndike's principle that behaviors followed by favorable consequences become more likely, and that behaviors followed by unfavorable consequences become less likely.","hint":"Consequence rule","unit":"Development & Learning"},{"term":"Reinforcement","definition":"In operant conditioning, any event that strengthens the behavior it follows.","hint":"Behavior enhancer","unit":"Development & Learning"},{"term":"Primary Reinforcers","definition":"An innately reinforcing stimulus, such as one that satisfies a biological need.","hint":"Natural reward","unit":"Development & Learning"},{"term":"Secondary Reinforcers","definition":"A stimulus that gains its reinforcing power through its association with a primary reinforcer.","hint":"Learned reward","unit":"Development & Learning"},{"term":"Reinforcement Discrimination","definition":"Occurs when only specific responses are reinforced.","hint":"Selective reinforcement","unit":"Development & Learning"},{"term":"Reinforcement Generalization","definition":"The tendency to respond to stimuli similar to the conditioned stimulus in operant conditioning.","hint":"Response broadening","unit":"Development & Learning"},{"term":"Positive Reinforcement","definition":"Increasing behaviors by presenting positive stimuli, such as food. A positive reinforcer is any stimulus that, when presented after a response, strengthens the response.","hint":"Reward addition","unit":"Development & Learning"},{"term":"Negative Reinforcement","definition":"Increasing behaviors by stopping or reducing negative stimuli. A negative reinforcer is any stimulus that, when removed after a response, strengthens the response.","hint":"Aversive removal","unit":"Development & Learning"},{"term":"Punishment","definition":"An event that tends to decrease the behavior that it follows.","hint":"Behavior suppressor","unit":"Development & Learning"},{"term":"Positive Punishment","definition":"The administration of a stimulus to decrease the probability of a behavior's recurring.","hint":"Adding aversive","unit":"Development & Learning"},{"term":"Negative Punishment","definition":"The removal of a stimulus to decrease the probability of a behavior's recurring.","hint":"Removing desired","unit":"Development & Learning"},{"term":"Shaping","definition":"An operant conditioning procedure in which reinforcers guide behavior toward closer and closer approximations of the desired behavior.","hint":"Stepwise conditioning","unit":"Development & Learning"},{"term":"Instinctive Drift","definition":"The tendency for animals to revert to instinctive behavior that interferes with learning.","hint":"Instinct interference","unit":"Development & Learning"},{"term":"Superstitious Behavior","definition":"A behavior repeated because it seems to produce reinforcement, even though it is actually unnecessary.","hint":"Irrational habit","unit":"Development & Learning"},{"term":"Reinforcement Schedules","definition":"The patterns by which reinforcements are given for desired behaviors.","hint":"Reward patterns","unit":"Development & Learning"},{"term":"Continuous Reinforcement","definition":"Reinforcing the desired response every time it occurs, leading to rapid learning.","hint":"Consistent reward","unit":"Development & Learning"},{"term":"Partial Reinforcement","definition":"Reinforcing a response only part of the time; results in slower acquisition but much greater resistance to extinction.","hint":"Intermittent reward","unit":"Development & Learning"},{"term":"Fixed Interval","definition":"A reinforcement schedule that reinforces a response only after a specified time has elapsed.","hint":"Timed reward","unit":"Development & Learning"},{"term":"Variable Interval","definition":"A reinforcement schedule that reinforces a response at unpredictable time intervals.","hint":"Random time reward","unit":"Development & Learning"},{"term":"Fixed Ratio","definition":"A reinforcement schedule that reinforces a response only after a specified number of responses.","hint":"Count-based reward","unit":"Development & Learning"},{"term":"Variable Ratio","definition":"A reinforcement schedule that reinforces a response after an unpredictable number of responses.","hint":"Random count reward","unit":"Development & Learning"},{"term":"Learned Helplessness","definition":"The hopelessness and passive resignation an animal or human learns when unable to avoid repeated aversive events.","hint":"Defeat acceptance","unit":"Development & Learning"},{"term":"Social Learning Theory","definition":"The theory that we learn social behavior by observing and imitating and by being rewarded or punished.","hint":"Observational learning","unit":"Development & Learning"},{"term":"Vicarious Conditioning","definition":"Learning the consequences of an action by watching others being rewarded or punished for performing the action.","hint":"Learning through others","unit":"Development & Learning"},{"term":"Insight Learning","definition":"A sudden realization of a problem's solution.","hint":"Aha moment","unit":"Development & Learning"},{"term":"Latent Learning","definition":"Learning that occurs but is not apparent until there is an incentive to demonstrate it.","hint":"Hidden knowledge","unit":"Development & Learning"},{"term":"Cognitive Maps","definition":"A mental representation of the layout of one's environment.","hint":"Mental layout","unit":"Development & Learning"},{"term":"Developmental Psychology","definition":"The scientific study of physical, cognitive, and social change throughout the life span.","hint":"Lifespan development","unit":"Development & Learning"},{"term":"Cross-sectional Research","definition":"A study in which people of different ages are compared with one another.","hint":"Age comparison","unit":"Development & Learning"},{"term":"Longitudinal Research","definition":"Research in which the same people are restudied and retested over a long period.","hint":"Time-span study","unit":"Development & Learning"},{"term":"Teratogens","definition":"Agents, such as chemicals and viruses, that can reach the embryo or fetus during prenatal development and cause harm.","hint":"Developmental threats","unit":"Development & Learning"},{"term":"Milestones","definition":"Major points in development that signify the achievement of certain physical, social, or emotional skills.","hint":"Developmental checkpoint","unit":"Development & Learning"},{"term":"Prenatal Development","definition":"The process of development from conception to birth.","hint":"Before birth development","unit":"Development & Learning"},{"term":"Fine Motor Coordination","definition":"The ability to make small, precise movements, typically involving the coordination of the hands and fingers with the eyes.","hint":"Detailed movement skill","unit":"Development & Learning"},{"term":"Gross Motor Coordination","definition":"The ability to make large, general movements, such as crawling and walking.","hint":"Broad movement skill","unit":"Development & Learning"},{"term":"Maturation","definition":"Biological growth processes that enable orderly changes in behavior, relatively uninfluenced by experience.","hint":"Natural growth","unit":"Development & Learning"},{"term":"Reflexes","definition":"Specific patterns of motor response that are triggered by specific patterns of sensory stimulation.","hint":"Innate responses","unit":"Development & Learning"},{"term":"Rooting Reflex","definition":"A baby's tendency, when touched on the cheek, to turn toward the touch, open the mouth, and search for the nipple.","hint":"Feeding instinct","unit":"Development & Learning"},{"term":"Visual Cliff","definition":"A laboratory device for testing depth perception in infants and young animals.","hint":"Depth perception test","unit":"Development & Learning"},{"term":"Critical Periods","definition":"Optimal periods shortly after birth when an organism's exposure to certain stimuli or experiences produces proper development.","hint":"Key development phases","unit":"Development & Learning"},{"term":"Sensitive Periods","definition":"Times in development when a person is particularly open to certain kinds of experiences.","hint":"Optimal learning times","unit":"Development & Learning"},{"term":"Imprinting","definition":"The process by which certain animals form strong attachments during early life.","hint":"Early bonding","unit":"Development & Learning"},{"term":"Growth Spurt","definition":"A rapid increase in growth, typically occurring during adolescence.","hint":"Rapid adolescent growth","unit":"Development & Learning"},{"term":"Puberty","definition":"The period of sexual maturation, during which a person becomes capable of reproducing.","hint":"Sexual development phase","unit":"Development & Learning"},{"term":"Primary Sex Characteristics","definition":"The body structures (ovaries, testes, and external genitalia) that make sexual reproduction possible.","hint":"Reproductive organs","unit":"Development & Learning"},{"term":"Secondary Sex Characteristics","definition":"Non-reproductive sexual traits, such as female breasts and hips, male voice quality, and body hair.","hint":"Sexual differentiation features","unit":"Development & Learning"},{"term":"Menarche","definition":"First menstruation.","hint":"","unit":"Development & Learning"},{"term":"Spermarche","definition":"First ejaculation.","hint":"","unit":"Development & Learning"},{"term":"Menopause","definition":"The time of natural cessation of menstruation; also refers to the biological changes a woman experiences as her ability to reproduce declines.","hint":"End of fertility","unit":"Development & Learning"},{"term":"Sex","definition":"The biologically influenced characteristics by which people define male and female.","hint":"Biological gender","unit":"Development & Learning"},{"term":"Gender","definition":"The socially influenced characteristics by which people define men and women.","hint":"Socially defined roles","unit":"Development & Learning"},{"term":"Jean Piaget","definition":"Swiss psychologist remembered for his studies of cognitive development in children.","hint":"Cognitive development pioneer","unit":"Development & Learning"},{"term":"Schemas","definition":"Concepts or mental frameworks that organize and interpret information.","hint":"Mental organizers","unit":"Development & Learning"},{"term":"Assimilation","definition":"Interpreting our new experiences in terms of our existing schemas.","hint":"Incorporating new info","unit":"Development & Learning"},{"term":"Accommodation","definition":"Adapting our current understandings (schemas) to incorporate new information.","hint":"Adjusting mental models","unit":"Development & Learning"},{"term":"Sensorimotor Stage","definition":"In Piaget's theory, the stage (from birth to about 2 years of age) during which infants know the world mostly in terms of their sensory impressions and motor activities.","hint":"Exploring through senses","unit":"Development & Learning"},{"term":"Object Permanence","definition":"The awareness that things continue to exist even when not perceived.","hint":"Out of sight, still exists","unit":"Development & Learning"},{"term":"Preoperational Stage","definition":"In Piaget's theory, the stage (from 2 to about 6 or 7 years of age) during which a child learns to use language but does not yet comprehend the mental operations of concrete logic.","hint":"Egocentric thinking","unit":"Development & Learning"},{"term":"Pretend Play","definition":"Playing with imagination and creating scenarios, usually seen in the preoperational stage.","hint":"Imaginative play","unit":"Development & Learning"},{"term":"Conservation","definition":"The principle (which Piaget believed to be a part of concrete operational reasoning) that properties such as mass, volume, and number remain the same despite changes in the forms of objects.","hint":"Understanding quantity stability","unit":"Development & Learning"},{"term":"Reversibility","definition":"The ability to recognize that numbers o
