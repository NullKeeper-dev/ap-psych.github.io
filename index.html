r objects can be changed and returned to their original condition.","hint":"Undoing actions","unit":"Development & Learning"},{"term":"Animism","definition":"The belief that objects that are inanimate have feelings, thoughts, and have the mental characteristics and qualities of living things.","hint":"Object life belief","unit":"Development & Learning"},{"term":"Egocentrism","definition":"In Piaget's theory, the preoperational child's difficulty taking another's point of view.","hint":"Self-centered thinking","unit":"Development & Learning"},{"term":"Theory of Mind","definition":"The ability to attribute mental states-beliefs, intents, desires, emotions, knowledge-to oneself and others and to understand that others have beliefs, desires, and intentions that are different from one's own.","hint":"Understanding others' minds","unit":"Development & Learning"},{"term":"Concrete Operational Stage","definition":"In Piaget's theory, the stage of cognitive development (from about 7 to 11 years) during which children gain the mental operations that enable them to think logically about concrete events.","hint":"Logical thinking","unit":"Development & Learning"},{"term":"Formal Operational Stage","definition":"In Piaget's theory, the stage of cognitive development (normally beginning about age 12) during which people begin to think logically about abstract concepts.","hint":"Abstract reasoning","unit":"Development & Learning"},{"term":"Lev Vygotsky","definition":"Russian psychologist who emphasized the role of the social environment on cognitive development and proposed the concept of the zone of proximal development.","hint":"Social development theorist","unit":"Development & Learning"},{"term":"Scaffolding (Vygotsky)","definition":"A framework that offers children temporary support as they develop higher levels of thinking.","hint":"Learning support","unit":"Development & Learning"},{"term":"Zone of Proximal Development","definition":"Vygotsky's theory of the range of tasks that are too difficult for a child to master alone but that can be learned with guidance and assistance from adults or more-skilled children.","hint":"Potential development area","unit":"Development & Learning"},{"term":"Crystallized Intelligence","definition":"The accumulated knowledge and verbal skills that increase with age.","hint":"Knowledge that sticks","unit":"Development & Learning"},{"term":"Fluid Intelligence","definition":"The ability to reason speedily and abstractly, which tends to decrease during late adulthood.","hint":"Flexible thinking","unit":"Development & Learning"},{"term":"Dementia","definition":"A decline in mental ability severe enough to interfere with daily life, most often seen in older adults.","hint":"Mental decline","unit":"Development & Learning"},{"term":"Language","definition":"A system of communication that combines symbols, such as words or gestural signs, in rule-based ways to create meaning.","hint":"Communication system","unit":"Development & Learning"},{"term":"Phonemes","definition":"The smallest units of sound in a language that are distinctive for speakers of the language.","hint":"Sound units","unit":"Development & Learning"},{"term":"Morphemes","definition":"The smallest units of meaning in a language.","hint":"Meaning units","unit":"Development & Learning"},{"term":"Semantics","definition":"The set of rules by which we derive meaning from morphemes, words, and sentences in a given language; the study of meaning.","hint":"Meaning rules","unit":"Development & Learning"},{"term":"Grammar","definition":"The system of rules in a language that enables us to communicate with and understand others.","hint":"Language rules","unit":"Development & Learning"},{"term":"Syntax","definition":"The arrangement of words and phrases to create well-formed sentences in a language.","hint":"Sentence structure","unit":"Development & Learning"},{"term":"Nonverbal Gestures","definition":"Body movements, expressions, and other non-verbal behavior that communicate without words, often instinctively.","hint":"Body language","unit":"Development & Learning"},{"term":"Cooing","definition":"Early vowel-like sounds that babies produce.","hint":"Baby sounds","unit":"Development & Learning"},{"term":"Babbling","definition":"Stage of language development at about 4 months when an infant spontaneously utters nonsense sounds.","hint":"Pre-language noises","unit":"Development & Learning"},{"term":"One-word Stage","definition":"The stage in speech development, from about age 1 to 2, during which a child speaks mostly in single words.","hint":"Single-word communication","unit":"Development & Learning"},{"term":"Telegraphic Speech","definition":"Early speech stage in which a child speaks like a telegram-\"go car\"-using mostly nouns and verbs and omitting auxiliary words.","hint":"Short, essential words","unit":"Development & Learning"},{"term":"Overgeneralization of Language Rules","definition":"Applying grammatical rules too widely and thereby creating incorrect forms.","hint":"Grammar overreach","unit":"Development & Learning"},{"term":"Ecological Systems Theory","definition":"Bronfenbrenner's theory that describes the nested social and cultural contexts that shape development.","hint":"Environmental influence layers","unit":"Development & Learning"},{"term":"Microsystem","definition":"The system closest to the person and the one in which they have direct contact, including family, school, neighborhood.","hint":"Immediate environment","unit":"Development & Learning"},{"term":"Mesosystem","definition":"The interactions between the different parts of a person's microsystem.","hint":"Connected environments","unit":"Development & Learning"},{"term":"Exosystem","definition":"External environmental settings that a person does not experience directly but that can affect them in one of their immediate environments.","hint":"Indirect influence","unit":"Development & Learning"},{"term":"Macrosystem","definition":"The cultural values, laws, customs, and resources that influence the other systems.","hint":"Broader societal context","unit":"Development & Learning"},{"term":"Chronosystem","definition":"The patterning of environmental events and transitions over the life course, as well as sociohistorical circumstances.","hint":"Time-based influences","unit":"Development & Learning"},{"term":"Authoritarian Parenting","definition":"Parenting style characterized by high demands and low responsiveness, where parents impose rules and expect obedience.","hint":"Strict parenting","unit":"Development & Learning"},{"term":"Authoritative Parenting","definition":"Parenting style characterized by high demands and high responsiveness, where parents set clear standards but also encourage independence.","hint":"Supportive, firm parenting","unit":"Development & Learning"},{"term":"Permissive Parenting","definition":"Parenting style characterized by low demands with high responsiveness, where parents are indulgent and lenient.","hint":"Lenient parenting","unit":"Development & Learning"},{"term":"Attachment Styles","definition":"Patterns of attachment in romantic relationships that reflect the views of oneself and the views of others.","hint":"Relationship patterns","unit":"Development & Learning"},{"term":"Secure Attachment","definition":"An attachment type where individuals feel comfortable with intimacy and autonomy, reflecting positive views of self and others.","hint":"Confident attachment","unit":"Development & Learning"},{"term":"Avoidant Attachment","definition":"An attachment style characterized by difficulty developing intimate relationships because previous attempts to be intimate have been rebuffed.","hint":"Distancing attachment","unit":"Development & Learning"},{"term":"Anxious Attachment","definition":"An attachment style characterized by a concern that others will not reciprocate one's desire for intimacy, resulting in higher-than-average levels of anxiety.","hint":"Worried attachment","unit":"Development & Learning"},{"term":"Disorganized Attachment","definition":"An attachment style characterized by inconsistent or contradictory behavior patterns in relationships.","hint":"Chaotic attachment","unit":"Development & Learning"},{"term":"Temperament","definition":"Basic emotional style that appears early in development and is largely genetic in origin.","hint":"Inborn personality","unit":"Development & Learning"},{"term":"Separation Anxiety","definition":"Emotional distress seen in many infants when they are separated from people with whom they have formed an attachment.","hint":"Fear of separation","unit":"Development & Learning"},{"term":"Contact Comfort","definition":"The instinctual need to touch and be touched by something soft, as seen in young rhesus monkeys with their cloth mothers.","hint":"Need for touch","unit":"Development & Learning"},{"term":"Parallel Play","definition":"Activity in which children play side by side without interacting.","hint":"Adjacent play","unit":"Development & Learning"},{"term":"Pretend Play","definition":"Playing with imagination and scenarios that involve make-believe.","hint":"Imaginative play","unit":"Development & Learning"},{"term":"Imaginary Audience","definition":"Adolescents' belief that they are the focus of everyone else's attention and concern.","hint":"Perceived spotlight","unit":"Development & Learning"},{"term":"Personal Fable","definition":"Adolescents' belief in their own uniqueness and invulnerability.","hint":"Uniqueness bias","unit":"Development & Learning"},{"term":"Social Clock","definition":"The culturally preferred timing of social events such as marriage, parenthood, and retirement.","hint":"Cultural timelines","unit":"Development & Learning"},{"term":"Emerging Adulthood","definition":"A period from about 18 to the mid-twenties, when many in Western cultures are no longer adolescents but have not yet achieved full independence as adults.","hint":"Transition phase","unit":"Development & Learning"},{"term":"Stage Theory of Psychosocial Development (Erikson)","definition":"Erik Erikson's theory that individuals pass through eight developmental stages, each involving a specific crisis that must be successfully resolved.","hint":"Lifespan development stages","unit":"Development & Learning"},{"term":"Trust vs. Mistrust","definition":"Erikson's first stage during the first year of life, where infants learn to trust when they are cared for in a consistent warm manner.","hint":"Foundation of trust","unit":"Development & Learning"},{"term":"Autonomy vs. Shame and Doubt","definition":"Erikson's stage in which a toddler learns to exercise will and to do things independently; failure results in feelings of shame and doubt.","hint":"Independence vs. insecurity","unit":"Development & Learning"},{"term":"Initiative vs. Guilt","definition":"Erikson's third stage in which the child finds independence in planning, playing, and other activities; success leads to a sense of initiative, while failure results in guilt.","hint":"Action vs. guilt","unit":"Development & Learning"},{"term":"Industry vs. Inferiority","definition":"Erikson's stage between 6 and 11 years, when the child learns to be productive or feels inferior.","hint":"Competence vs. failure","unit":"Development & Learning"},{"term":"Identity vs. Role Confusion","definition":"Erikson's stage during adolescence when teens work at refining a sense of self by testing roles and integrating them to form a single identity or becoming confused about who they are.","hint":"Self-discovery vs. confusion","unit":"Development & Learning"},{"term":"Intimacy vs. Isolation","definition":"Erikson's stage in early adulthood in which individuals form deeply personal relationships, marry, begin families, or feel socially isolated.","hint":"Relationships vs. loneliness","unit":"Development & Learning"},{"term":"Generativity vs. Stagnation","definition":"Erikson's stage of social development in which middle-aged people begin to devote themselves more to fulfilling one's potential and doing public service.","hint":"Contribution vs. stagnation","unit":"Development & Learning"},{"term":"Integrity vs. Despair","definition":"Erikson's final stage in which those near the end of life look back and evaluate their lives.","hint":"Life reflection","unit":"Development & Learning"},{"term":"Adverse Childhood Experiences (ACEs)","definition":"Stressful or traumatic events in childhood, such as abuse, neglect, and family dysfunction, that impact an individual's health and well-being throughout life.","hint":"Traumatic childhood impacts","unit":"Development & Learning"},{"term":"Achievement (Adolescent Development)","definition":"Adolescents' ability to set goals, follow through and accomplish tasks.","hint":"Goal achievement","unit":"Development & Learning"},{"term":"Diffusion (Adolescent Development)","definition":"Lack of direction or an apathy toward making important life decisions, often seen in the search for identity.","hint":"Indecisiveness","unit":"Development & Learning"},{"term":"Foreclosure (Adolescent Development)","definition":"The premature commitment to an identity without adequate consideration of other options.","hint":"Early decision lock-in","unit":"Development & Learning"},{"term":"Moratorium (Adolescent Development)","definition":"A socially acceptable way to postpone making identity-achievement decisions. Going to college is a common example.","hint":"Decision postponement","unit":"Development & Learning"},{"term":"Conformity","definition":"Adjusting one's behavior or thinking to coincide with a group standard.","hint":"Group alignment","unit":"Development & Learning"},{"term":"Normative Social Influence","definition":"Influence resulting from a person's desire to gain approval or avoid disapproval.","hint":"Approval seeking","unit":"Development & Learning"},{"term":"Social Norms","definition":"Expected standards of conduct, which influence behavior.","hint":"Behavioral expectations","unit":"Development & Learning"},{"term":"Social Comparison","definition":"Evaluating one's abilities and opinions by comparing oneself with others.","hint":"Comparative evaluation","unit":"Development & Learning"},{"term":"Relative Deprivation","definition":"The perception that one is worse off relative to those with whom one compares oneself.","hint":"Comparative discontent","unit":"Development & Learning"},{"term":"Informational Social Influence","definition":"Influence resulting from one's willingness to accept others' opinions about reality.","hint":"Information seeking","unit":"Social Psychology & Personality"},{"term":"Obedience","definition":"Following direct commands, usually from an authority figure.","hint":"Command adherence","unit":"Social Psychology & Personality"},{"term":"Social Facilitation","definition":"Improved performance on simple or well-learned tasks in the presence of others.","hint":"Audience boost","unit":"Social Psychology & Personality"},{"term":"Group Polarization","definition":"The enhancement of a group's prevailing inclinations through discussion within the group.","hint":"Opinion intensification","unit":"Social Psychology & Personality"},{"term":"Groupthink","definition":"The mode of thinking that occurs when the desire for harmony in a decision-making group overrides a realistic appraisal of alternatives.","hint":"Consensus over accuracy","unit":"Social Psychology & Personality"},{"term":"Bystander Effect","definition":"The tendency for any given bystander to be less likely to give aid if other bystanders are present.","hint":"Shared responsibility inaction","unit":"Social Psychology & Personality"},{"term":"Diffusion of Responsibility","definition":"Reduction in feelings of personal responsibility in the presence of others.","hint":"Spread responsibility","unit":"Social Psychology & Personality"},{"term":"Social Loafing","definition":"The tendency for people in a group to exert less effort when pooling their efforts toward attaining a common goal than when individually accountable.","hint":"Group effort reduction","unit":"Social Psychology & Personality"},{"term":"Deindividuation","definition":"The loss of self-awareness and self-restraint occurring in group situations that foster arousal and anonymity.","hint":"Anonymity loss of control","unit":"Social Psychology & Personality"},{"term":"Attribution Theory","definition":"The theory that we explain someone's behavior by crediting either the situation or the person's disposition.","hint":"Behavior explanation","unit":"Social Psychology & Personality"},{"term":"Dispositional Attributions","definition":"Assigning the cause of behavior to personal dispositions, traits, abilities, and feelings.","hint":"Personality-based explanation","unit":"Social Psychology & Personality"},{"term":"Situational Attributions","definition":"Assigning the cause of behavior to environmental factors.","hint":"Context-based explanation","unit":"Social Psychology & Personality"},{"term":"Explanatory Style","definition":"A person's habitual way of explaining events, typically assessed along three dimensions: internal/external, stable/unstable, and global/specific.","hint":"Cognitive interpretation","unit":"Social Psychology & Personality"},{"term":"Optimistic Explanatory Style","definition":"Explaining bad events as due to temporary, specific, external causes, and good events as due to permanent, general, internal causes.","hint":"Positive outlook","unit":"Social Psychology & Personality"},{"term":"Pessimistic Explanatory Style","definition":"Explaining bad events as due to permanent, general, internal causes, and good events as temporary, specific, external causes.","hint":"Negative outlook","unit":"Social Psychology & Personality"},{"term":"Fundamental Attribution Error","definition":"The tendency for observers, when analyzing another's behavior, to underestimate the impact of the situation and to overestimate the impact of personal disposition.","hint":"Bias in judgment","unit":"Social Psychology & Personality"},{"term":"Actor-Observer Bias","definition":"The tendency to blame our actions on the situation and blame the actions of others on their personalities.","hint":"Perspective bias","unit":"Social Psychology & Personality"},{"term":"Self-Serving Bias","definition":"The tendency to perceive oneself favorably.","hint":"Self-favorable bias","unit":"Social Psychology & Personality"},{"term":"Internal Locus of Control","definition":"The perception that one controls one's own fate.","hint":"Self-control belief","unit":"Social Psychology & Personality"},{"term":"External Locus of Control","definition":"The perception that chance or outside forces beyond one's personal control determine one's fate.","hint":"Fate belief","unit":"Social Psychology & Personality"},{"term":"Altruism","definition":"Unselfish regard for the welfare of others.","hint":"Helping others","unit":"Social Psychology & Personality"},{"term":"Social Responsibility Norm","definition":"An expectation that people will help those needing help.","hint":"Cultural helping rule","unit":"Social Psychology & Personality"},{"term":"Stereotype","definition":"A generalized (sometimes accurate but often overgeneralized) belief about a group of people.","hint":"Oversimplified image","unit":"Social Psychology & Personality"},{"term":"Confirmation Bias","definition":"A tendency to search for information that supports our preconceptions and to ignore or distort contradictory evidence.","hint":"Supporting beliefs","unit":"Social Psychology & Personality"},{"term":"Belief Perseverance","definition":"Clinging to one's initial conceptions after the basis on which they were formed has been discredited.","hint":"Sticking to beliefs","unit":"Social Psychology & Personality"},{"term":"Self-Fulfilling Prophecy","definition":"A belief that leads to its own fulfillment.","hint":"Expectation creates reality","unit":"Social Psychology & Personality"},{"term":"Prejudice","definition":"An unjustifiable (and usually negative) attitude toward a group and its members.","hint":"Prejudgment","unit":"Social Psychology & Personality"},{"term":"Discrimination","definition":"Unjustifiable negative behavior toward a group and its members.","hint":"Action on prejudice","unit":"Social Psychology & Personality"},{"term":"Implicit Attitudes","definition":"Attitudes that influence a person's feelings and behavior at an unconscious level.","hint":"Unconscious beliefs","unit":"Social Psychology & Personality"},{"term":"Just-World Phenomenon","definition":"The tendency for people to believe the world is just and that people therefore get what they deserve and deserve what they get.","hint":"Fair world belief","unit":"Social Psychology & Personality"},{"term":"Out-Group Homogeneity Bias","definition":"Perception of out-group members as more similar to one another than are in-group members.","hint":"Them all alike","unit":"Social Psychology & Personality"},{"term":"In-Group Bias","definition":"The tendency to favor one's own group.","hint":"Us favoritism","unit":"Social Psychology & Personality"},{"term":"Mere Exposure Effect","definition":"The phenomenon that repeated exposure to novel stimuli increases liking of them.","hint":"Familiarity preference","unit":"Social Psychology & Personality"},{"term":"Ethnocentrism","definition":"Believing in the superiority of one's own ethnic and cultural group, and having a corresponding disdain for all other groups.","hint":"Cultural superiority","unit":"Social Psychology & Personality"},{"term":"Superordinate Goals","definition":"Shared goals that override differences among people and require their cooperation.","hint":"Common goals","unit":"Social Psychology & Personality"},{"term":"Social Traps","definition":"A situation in which the conflicting parties, by each rationally pursuing their self-interest, become caught in mutually destructive behavior.","hint":"Conflict spiral","unit":"Social Psychology & Personality"},{"term":"Persuasion","definition":"The process of creating, reinforcing, or changing people's beliefs or actions.","hint":"Influence tactics","unit":"Social Psychology & Personality"},{"term":"Elaboration Likelihood Model","definition":"A theory of how persuasive messages lead to attitude changes.","hint":"Persuasion paths","unit":"Social Psychology & Personality"},{"term":"Central Route of Persuasion","definition":"Persuasion that involves high elaboration - where people pay attention to the arguments and respond with favorable thoughts.","hint":"Deep processing","unit":"Social Psychology & Personality"},{"term":"Peripheral Route of Persuasion","definition":"Persuasion that involves low elaboration - where people do not scrutinize the arguments but are swayed by surface characteristics.","hint":"Surface appeal","unit":"Social Psychology & Personality"},{"term":"Halo Effect","definition":"The tendency for an impression created in one area to influence opinion in another area.","hint":"Overall impression impact","unit":"Social Psychology & Personality"},{"term":"Foot-in-the-Door Technique","definition":"The tendency for people who have first agreed to a small request to comply later with a larger request.","hint":"Small to big commitment","unit":"Social Psychology & Personality"},{"term":"Door-in-the-Face Technique","definition":"The tendency for people who won't admit to a large task, but then agree when a smaller request is made.","hint":"Big to small compromise","unit":"Social Psychology & Personality"},{"term":"False Consensus Effect","definition":"The tendency to overestimate the extent to which others share our beliefs and behaviors.","hint":"Assumed agreement","unit":"Social Psychology & Personality"},{"term":"Cognitive Dissonance","definition":"The theory that we act to reduce the discomfort we feel when two of our thoughts are inconsistent.","hint":"Internal conflict","unit":"Social Psychology & Personality"},{"term":"Industrial-Organizational (I/O) Psychologists","definition":"Professionals who apply psychological principles and research methods to the workplace in the interest of improving productivity and the quality of work life.","hint":"Workplace psychologists","unit":"Social Psychology & Personality"},{"term":"Instincts","definition":"Fixed, inborn patterns of behavior that are biologically determined rather than learned.","hint":"Natural behaviors","unit":"Social Psychology & Personality"},{"term":"Drive-Reduction Theory","definition":"The idea that a physiological need creates an aroused state that drives the organism to reduce that need by engaging in some behavior.","hint":"Need-based motivation","unit":"Social Psychology & Personality"},{"term":"Homeostasis","definition":"The tendency to maintain a balanced or constant internal state; the regulation of any aspect of body chemistry, such as blood glucose, around a particular level.","hint":"Balance maintenance","unit":"Social Psychology & Personality"},{"term":"Hypothalamus","definition":"A neural structure lying below the thalamus; it directs several maintenance activities (eating, drinking, body temperature), helps govern the endocrine system via the pituitary gland, and is linked to emotion and reward.","hint":"i","unit":"Social Psychology & Personality"},{"term":"Pituitary Gland","definition":"The endocrine system's most influential gland. Under the influence of the hypothalamus, the pituitary regulates growth and controls other endocrine glands.","hint":"Master gland","unit":"Social Psychology & Personality"},{"term":"Belongingness","definition":"The human emotional need to be an accepted member of a group.","hint":"Need for acceptance","unit":"Social Psychology & Personality"},{"term":"Arousal Theory","definition":"The theory that people are motivated to maintain an optimal level of alertness and physical and mental activation.","hint":"Optimal arousal","unit":"Social Psychology & Personality"},{"term":"Yerkes-Dodson Law","definition":"The principle that performance increases with arousal only up to a point, beyond which performance decreases.","hint":"Arousal-performance link","unit":"Social Psychology & Personality"},{"term":"Sensation-Seeking Theory","definition":"The search for experiences and feelings that are varied, novel, complex, and intense.","hint":"Thrill pursuit","unit":"Social Psychology & Personality"},{"term":"Thrill Seeking","definition":"Pursuing activities that provide a rush of adrenaline and excitement.","hint":"Adrenaline activities","unit":"Social Psychology & Personality"},{"term":"Adventure Seeking","definition":"Engaging in activities that are unusual, exciting, and risky.","hint":"Quest for adventure","unit":"Social Psychology & Personality"},{"term":"Disinhibition","definition":"The tendency to transmit messages without considering their consequences, often found in high sensation-seekers.","hint":"Impulse lack of restraint","unit":"Social Psychology & Personality"},{"term":"Boredom Susceptibility","definition":"The tendency to become easily bored by familiar, repeated experiences.","hint":"Quickly disinterested","unit":"Social Psychology & Personality"},{"term":"Incentive Theory","definition":"A theory of motivation asserting that behavior is directed toward attaining desirable stimuli and avoiding unwanted stimuli.","hint":"Reward-driven behavior","unit":"Social Psychology & Personality"},{"term":"Extrinsic Motivation","definition":"A desire to perform a behavior to receive promised rewards or avoid threatened punishment.","hint":"External rewards","unit":"Social Psychology & Personality"},{"term":"Self-Determination Theory","definition":"A theory of motivation that is concerned with the beneficial effects of intrinsic motivation and the harmful effects of extrinsic motivation.","hint":"Autonomy in motivation","unit":"Social Psychology & Personality"},{"term":"Intrinsic Motivation","definition":"A desire to perform a behavior effectively for its own sake.","hint":"Internal satisfaction","unit":"Social Psychology & Personality"},{"term":"Lewin's Motivational Conflicts Theory","definition":"A theory that describes situations in which there are conflicts between different types of motivations.","hint":"Motivational conflict types","unit":"Social Psychology & Personality"},{"term":"Approach-Approach Conflicts","definition":"Conflicts arising when a person must choose between two desirable goals.","hint":"Two positives choice","unit":"Social Psychology & Personality"},{"term":"Avoidance-Avoidance Conflicts","definition":"Conflicts arising when a person must choose between two undesirable goals.","hint":"Two negatives choice","unit":"Social Psychology & Personality"},{"term":"Approach-Avoidance Conflicts","definition":"Conflicts arising when a single goal has both positive and negative aspects.","hint":"Mixed feelings choice","unit":"Social Psychology & Personality"},{"term":"Emotion","definition":"A response of the whole organism, involving physiological arousal, expressive behaviors, and conscious experience.","hint":"Full-body response","unit":"Social Psychology & Personality"},{"term":"Facial-Feedback Hypothesis","definition":"The idea that facial expressions can influence emotions as well as reflect them.","hint":"Expression affects emotion","unit":"Social Psychology & Personality"},{"term":"Display Rules","definition":"Culturally determined rules about which nonverbal behaviors are appropriate to display.","hint":"Cultural expression guidelines","unit":"Social Psychology & Personality"},{"term":"Elicitors","definition":"Stimuli that trigger a physiological response, often an emotional one.","hint":"Emotion triggers","unit":"Social Psychology & Personality"},{"term":"Broaden-and-Build Theory of Emotion","definition":"Theory proposing that happiness predisposes us to think more openly, allowing us to see the \"big picture\" we might have otherwise overlooked.","hint":"Happiness expands thought","unit":"Social Psychology & Personality"},{"term":"Universal Emotions","definition":"Basic emotions that are shared by all humans, including happiness, sadness, fear, disgust, anger, and surprise.","hint":"Common human emotions","unit":"Social Psychology & Personality"},{"term":"Psychodynamic Theory","definition":"A view that explains personality in terms of conscious and unconscious forces, such as unconscious desires and beliefs.","hint":"Unconscious motivation","unit":"Social Psychology & Personality"},{"term":"Preconscious Mind","definition":"In Freudian theory, thoughts and feelings that are not currently in consciousness but that can easily be brought into consciousness.","hint":"Accessible unconscious","unit":"Social Psychology & Personality"},{"term":"Unconscious Mind","definition":"A reservoir of mostly unacceptable thoughts, wishes, feelings, and memories according to Freudian psychology.","hint":"Deep hidden thoughts","unit":"Social Psychology & Personality"},{"term":"Denial","definition":"Defense mechanism by which people refuse to accept reality.","hint":"Reality rejection","unit":"Social Psychology & Personality"},{"term":"Displacement","definition":"Defense mechanism that shifts sexual or aggressive impulses toward a more acceptable or less threatening object or person, redirecting anger toward a safer outlet.","hint":"Redirect emotion","unit":"Social Psychology & Personality"},{"term":"Projection","definition":"Defense mechanism by which people disguise their own threatening impulses by attributing them to others.","hint":"Blame others","unit":"Social Psychology & Personality"},{"term":"Rationalization","definition":"Defense mechanism that offers self-justifying explanations in place of the real, more threatening, unconscious reasons for one's actions.","hint":"Justify behavior","unit":"Social Psychology & Personality"},{"term":"Reaction Formation","definition":"Defense mechanism by which the ego unconsciously switches unacceptable impulses into their opposites.","hint":"Opposite reaction","unit":"Social Psychology & Personality"},{"term":"Regression","definition":"Defense mechanism in which an individual faced with anxiety retreats to a more infantile psychosexual stage.","hint":"Revert to childhood","unit":"Social Psychology & Personality"},{"term":"Repression","definition":"Defense mechanism that banishes anxiety-arousing thoughts, feelings, and memories from consciousness.","hint":"Suppress memories","unit":"Social Psychology & Personality"},{"term":"Sublimation","definition":"Defense mechanism by which people re-channel their unacceptable impulses into socially approved activities.","hint":"Redirect into acceptable","unit":"Social Psychology & Personality"},{"term":"Trait Theories","definition":"Theories that endeavor to describe the characteristics that make up human personality in an effort to predict future behavior.","hint":"Personality descriptors","unit":"Social Psychology & Personality"},{"term":"Big Five Theory","definition":"A trait theory that identifies five main characteristics that account for most individual differences in personality: openness, conscientiousness, extraversion, agreeableness, and neuroticism.","hint":"Five-factor model","unit":"Social Psychology & Personality"},{"term":"Personality Inventories","definition":"A type of questionnaire designed to reveal the respondent's personality traits.","hint":"Personality assessment","unit":"Social Psychology & Personality"},{"term":"Factor Analysis","definition":"A statistical procedure that identifies clusters of related items (called factors) on a test; used to identify different dimensions of performance that underlie one's total score.","hint":"Data clustering","unit":"Social Psychology & Personality"},{"term":"Openness to Experience","definition":"A personality dimension that characterizes someone who is adventurous, imaginative, and open to new experiences.","hint":"Curiosity trait","unit":"Social Psychology & Personality"},{"term":"Conscientiousness","definition":"A personality dimension that describes someone who is responsible, dependable, persistent, and organized.","hint":"Diligent trait","unit":"Social Psychology & Personality"},{"term":"Extraversion","definition":"A personality dimension describing someone who is sociable, gregarious, and assertive.","hint":"Outgoing trait","unit":"Social Psychology & Personality"},{"term":"Agreeableness","definition":"A personality dimension that includes attributes such as trust, altruism, kindness, affection, and other prosocial behaviors.","hint":"Cooperative trait","unit":"Social Psychology & Personality"},{"term":"Emotional Stability (Neuroticism)","definition":"A personality trait which implies a high degree of emotional resilience, that is the ability to maintain calm during stressful situations or quickly recover from such incidents.","hint":"Stress resilience","unit":"Social Psychology & Personality"},{"term":"Humanistic Psychology","definition":"A perspective that emphasizes the growth potential of healthy people and the individual's potential for personal growth.","hint":"Positive potential","unit":"Social Psychology & Personality"},{"term":"Unconditional Positive Regard","definition":"An attitude of total acceptance toward another person.","hint":"Accept without conditions","unit":"Social Psychology & Personality"},{"term":"Self-Actualizing Tendency","definition":"The human motive toward realizing our inner potential, as a major factor in personality.","hint":"Fulfill one's potential","unit":"Social Psychology & Personality"},{"term":"Social-Cognitive Theory","definition":"View of behavior as influenced by the interaction between people's traits (including their thinking) and their social context.","hint":"Interaction of person and environment","unit":"Social Psychology & Personality"},{"term":"Reciprocal Determinism","definition":"The interacting influences of behavior, internal cognition, and environment.","hint":"Mutual influence","unit":"Social Psychology & Personality"},{"term":"Self-Concept","definition":"All our thoughts and feelings about ourselves, in answer to the question, \"Who am I?\".","hint":"Identity understanding","unit":"Social Psychology & Personality"},{"term":"Self-Efficacy","definition":"One's sense of competence and effectiveness.","hint":"Belief in one's ability","unit":"Social Psychology & Personality"},{"term":"Self-Esteem","definition":"One's feelings of high or low self-worth.","hint":"Value of self","unit":"Social Psychology & Personality"},{"term":"Health Psychology","definition":"The study of psychological and behavioral processes in health, illness, and healthcare.","hint":"","unit":"Mental & Physical Health"},{"term":"Stress","definition":"The process by which we perceive and respond to certain events, called stressors, that we appraise as threatening or challenging.","hint":"Response to challenge","unit":"Mental & Physical Health"},{"term":"Hypertension","definition":"High blood pressure, often caused by stress and other factors.","hint":"Elevated blood pressure","unit":"Mental & Physical Health"},{"term":"Immune Suppression","definition":"Reduction in the activity of the body's immune system, often induced by stress.","hint":"Weakened immunity","unit":"Mental & Physical Health"},{"term":"Stressors","definition":"Events or situations that are perceived as harmful, threatening, or challenging.","hint":"Stress triggers","unit":"Mental & Physical Health"},{"term":"Daily Hassles","definition":"Everyday minor events that annoy or bother people and which can add up to health problems.","hint":"Minor daily irritants","unit":"Mental & Physical Health"},{"term":"Significant Life Changes","definition":"Major life transitions like moving, leaving a job, or losing a loved one, which can be stressful.","hint":"Major life adjustments","unit":"Mental & Physical Health"},{"term":"Catastrophes","definition":"Unpredictable large-scale events that cause significant stress and can be traumatic.","hint":"Large-scale disasters","unit":"Mental & Physical Health"},{"term":"Eustress (Motivating)","definition":"Positive stress which can help to improve performance.","hint":"Beneficial stress","unit":"Mental & Physical Health"},{"term":"Distress (Debilitating)","definition":"Negative stress that can cause anxiety or concern and can decrease performance.","hint":"Harmful stress","unit":"Mental & Physical Health"},{"term":"Adverse Childhood Experiences (ACEs)","definition":"Stressful or traumatic events in childhood that impact health and well-being across the lifespan.","hint":"Childhood trauma","unit":"Mental & Physical Health"},{"term":"General Adaptation Syndrome (GAS)","definition":"Selye's concept of the body's adaptive response to stress in three phases-alarm, resistance, exhaustion.","hint":"Stress response stages","unit":"Mental & Physical Health"},{"term":"Alarm Reaction Phase","definition":"The initial reaction to a stressor, activating the body's defenses.","hint":"Initial alert","unit":"Mental & Physical Health"},{"term":"Resistance Phase","definition":"The second phase, during which the body adapts to and uses resources to cope with a stressor.","hint":"Defense mode","unit":"Mental & Physical Health"},{"term":"Fight-Flight-Freeze Response","definition":"An animal's instinct to react to a threat by fighting, fleeing, or freezing.","hint":"Survival reactions","unit":"Mental & Physical Health"},{"term":"Exhaustion Phase","definition":"The third phase of GAS, when the body's resources are depleted.","hint":"Burnout stage","unit":"Mental & Physical Health"},{"term":"Tend-and-Befriend Theory","definition":"Theory that suggests people, especially women, seek social alliances to manage stress.","hint":"Social coping strategy","unit":"Mental & Physical Health"},{"term":"Problem-focused Coping","definition":"Tackling a stressful situation directly to alleviate stress.","hint":"Direct problem solving","unit":"Mental & Physical Health"},{"term":"Emotion-focused Coping","definition":"Managing emotions in the face of stress, seeking to change the way one feels about or perceives a problem.","hint":"Emotional adjustment","unit":"Mental & Physical Health"},{"term":"Positive Psychology","definition":"The scientific study of human flourishing, with the goal of discovering and promoting strengths and virtues that help individuals and communities thrive.","hint":"Study of well-being","unit":"Mental & Physical Health"},{"term":"Subjective Well-being","definition":"Individuals' personal perceptions of their overall happiness and life satisfaction.","hint":"Self-rated happiness","unit":"Mental & Physical Health"},{"term":"Resilience","definition":"The personal strength that helps most people cope with stress and recover from adversity and even trauma.","hint":"Recovery strength","unit":"Mental & Physical Health"},{"term":"Posttraumatic Growth","definition":"Positive psychological changes as a result of struggling with extremely challenging circumstances and life crises.","hint":"Growth after trauma","unit":"Mental & Physical Health"},{"term":"Positive Emotions","definition":"Feelings like joy, happiness, and love that can enhance one's approach to life.","hint":"Uplifting feelings","unit":"Mental & Physical Health"},{"term":"Gratitude","definition":"A feeling of thankfulness and appreciation, especially in response to someone doing something kind or helpful.","hint":"Thankfulness","unit":"Mental & Physical Health"},{"term":"Signature Strengths & Virtues","definition":"Personal characteristics that define who we are and which influence how we manage our environment.","hint":"Core qualities","unit":"Mental & Physical Health"},{"term":"Categories of Virtues (Wisdom, Courage, Humanity, Justice, Temperance, Transcendence)","definition":"Classifications of core virtues that guide behavior and contribute to a well-lived life.","hint":"Virtue types","unit":"Mental & Physical Health"},{"term":"Abnormal Psychology","definition":"The study of psychological disorders and the treatment of these disorders.","hint":"","unit":"Mental & Physical Health"},{"term":"Clinical Psychology","definition":"A branch of psychology that studies, assesses, and treats people with psychological disorders,.","hint":"","unit":"Mental & Physical Health"},{"term":"Diagnostic and Statistical Manual of Mental Disorders, Fifth Edition, Text Revision (DSM-5-TR)","definition":"The current authoritative guide for diagnosing mental disorders in the U.S.","hint":"Mental disorder classification manual","unit":"Mental & Physical Health"},{"term":"International Classification of Mental Disorders (ICD)","definition":"A system used by the World Health Organization (WHO) for classifying psychological disorders.","hint":"Global disorder classification","unit":"Mental & Physical Health"},{"term":"Deviation","definition":"Departing from the usual or accepted standards, especially in social or sexual behavior.","hint":"Norm departure","unit":"Mental & Physical Health"},{"term":"Distress","definition":"Extreme anxiety, sorrow, or pain that affects mental health.","hint":"Severe discomfort","unit":"Mental & Physical Health"},{"term":"Dysfunction","definition":"Disruption of normal social, emotional, or mental functions.","hint":"Impaired functioning","unit":"Mental & Physical Health"},{"term":"Eclectic Approach","definition":"A therapeutic approach combining methods from different therapies based on the client's needs, emphasizing flexibility and tailored treatment.","hint":"Customized therapy blend","unit":"Mental & Physical Health"},{"term":"Behavioral Perspective","definition":"Views psychological disorders through a lens of learned behaviors and responses to environmental stimuli, focusing on observable behaviors and their management.","hint":"Behavior modification","unit":"Mental & Physical Health"},{"term":"Psychodynamic Perspective","definition":"Explores psychological disorders as the product of unconscious dynamics, past conflicts, and childhood experiences, suggesting that unresolved unconscious conflicts manifest as disorders.","hint":"Unconscious conflicts","unit":"Mental & Physical Health"},{"term":"Humanistic Perspective","definition":"Considers psychological disorders as impairments in self-actualization and obstacles to personal growth, emphasizing the role of personal agency and psychological well-being.","hint":"Blocked personal growth","unit":"Mental & Physical Health"},{"term":"Cognitive Perspective","definition":"Analyzes psychological disorders through patterns of faulty or irrational thinking and beliefs, focusing on correcting cognitive distortions to alleviate mental distress.","hint":"Cognitive distortions","unit":"Mental & Physical Health"},{"term":"Evolutionary Perspective","definition":"Investigates the origins of psychological disorders as maladaptations or evolutionary mismatches, emphasizing how evolution shapes behaviors and psychological traits.","hint":"Evolutionary mismatches","unit":"Biological Bases of Behavior"},{"term":"Sociocultural Perspective","definition":"Examines how cultural context influences the prevalence and nature of psychological disorders, considering the impact of social norms and cultural expectations.","hint":"Cultural context effects","unit":"Mental & Physical Health"},{"term":"Biological Perspective","definition":"Attributes psychological disorders to organic or neurobiological causes, focusing on brain structures, neurochemistry, and genetic factors.","hint":"Neurobiological underpinnings","unit":"Mental & Physical Health"},{"term":"Biopsychosocial Model","definition":"A holistic approach that explains psychological disorders by considering the interplay of biological, psychological, and social factors, offering a comprehensive framework for understanding mental health.","hint":"Integrated health framework","unit":"Mental & Physical Health"},{"term":"Diathesis-Stress Model","definition":"Suggests that a person may be predisposed for a psychological disorder that remains unexpressed until triggered by stress.","hint":"Predisposition plus stress","unit":"Mental & Physical Health"},{"term":"Stigma","definition":"Disapproval attached to disobeying the expected norms.","hint":"Social disapproval","unit":"Mental & Physical Health"},{"term":"Anxiety Disorders","definition":"Psychological disorders characterized by distressing, persistent anxiety or maladaptive behaviors that reduce anxiety.","hint":"Persistent worry disorders","unit":"Mental & Physical Health"},{"term":"Specific Phobia","definition":"Fear of a specific object, situation, or activity that is excessive and unreasonable.","hint":"Irrational fear","unit":"Mental & Physical Health"},{"term":"Acrophobia","definition":"Fear of heights.","hint":"","unit":"Mental & Physical Health"},{"term":"Arachnophobia","definition":"Fear of spiders.","hint":"","unit":"Mental & Physical Health"},{"term":"Agoraphobia","definition":"Fear of open spaces or being in crowded, public places where escape might be difficult.","hint":"Public space fear","unit":"Mental & Physical Health"},{"term":"Panic Disorder","definition":"An anxiety disorder marked by unpredictable, minutes-long episodes of intense dread in which a person experiences terror and accompanying chest pain, pounding heart, or other physical symptoms.","hint":"Sudden panic episodes","unit":"Mental & Physical Health"},{"term":"Ataque de nervios","definition":"A syndrome among individuals of Latino descent, characterized by symptoms of intense emotional upset, including acute anxiety, anger, or grief, screaming and shouting uncontrollably, attacks of crying, trembling, heat in the chest rising into the head, and becoming verbally and physically aggressive.","hint":"Cultural anxiety response","unit":"Mental & Physical Health"},{"term":"Taijin Kyofusho","definition":"A Japanese cultural syndrome characterized by a person's intense fear that their body, body parts, or bodily functions give offense to others.","hint":"Japanese social phobia","unit":"Mental & Physical Health"},{"term":"Social Anxiety Disorder","definition":"Intense fear of social situations, leading to avoidance of such.","hint":"Social interaction fear","unit":"Mental & Physical Health"},{"term":"Generalized Anxiety Disorder","definition":"An anxiety disorder in which a person is continually tense, apprehensive, and in a state of autonomic nervous system arousal.","hint":"Constant worry","unit":"Mental & Physical Health"},{"term":"Obsessive-Compulsive Disorders","definition":"Disorders characterized by obsessive thoughts or compulsive actions.","hint":"Repetitive thoughts/behaviors","unit":"Mental & Physical Health"},{"term":"Hoarding Disorder","definition":"Persistent difficulty discarding or parting with possessions, regardless of their actual value.","hint":"Compulsive keeping","unit":"Mental & Physical Health"},{"term":"Trauma and Stressor-Related Disorders","definition":"A group of emotional and behavioral problems that may result from childhood or adult experiences of severe trauma.","hint":"","unit":"Mental & Physical Health"},{"term":"Posttraumatic Stress Disorder (PTSD)","definition":"A disorder characterized by haunting memories, nightmares, social withdrawal, jumpy anxiety, and/or insomnia that lingers for four weeks or more after a traumatic experience.","hint":"Trauma aftermath","unit":"Mental & Physical Health"},{"term":"Major Depressive Disorder","definition":"A mood disorder in which a person experiences, in the absence of drugs or another medical condition, two or more weeks of significantly depressed moods, feelings of worthlessness, and diminished interest or pleasure in most activities.","hint":"Severe depression","unit":"Mental & Physical Health"},{"term":"Persistent Depressive Disorder","definition":"A depressive disorder characterized by a chronically sad and melancholy mood.","hint":"Long-term mild depression","unit":"Mental & Physical Health"},{"term":"Bipolar Disorder","definition":"A mood disorder in which the person alternates between the hopelessness and lethargy of depression and the overexcited state of mania.","hint":"Mood extremes","unit":"Mental & Physical Health"},{"term":"Bipolar I Disorder","definition":"A type of bipolar spectrum disorder characterized by the occurrence of at least one manic episode, with or without mixed or depressive episodes.","hint":"Severe manic episodes","unit":"Mental & Physical Health"},{"term":"Bipolar II Disorder","definition":"A type of bipolar disorder marked by mildly manic (hypomanic) episodes and major depressive episodes.","hint":"Mild mania and severe depression","unit":"Mental & Physical Health"},{"term":"Neurodevelopmental Disorders","definition":"Group of disorders that affect the development of the nervous system, leading to abnormal brain function which may impact emotion, learning ability, self-control, and memory.","hint":"","unit":"Mental & Physical Health"},{"term":"Attention-Deficit/Hypera ctivity Disorder (ADHD)","definition":"A psychological disorder marked by extreme inattention and/or hyperactivity and impulsivity.","hint":"Focus and hyperactivity issues","unit":"Mental & Physical Health"},{"term":"Autism Spectrum Disorder (ASD)","definition":"A disorder that appears in childhood and is marked by significant deficiencies in communication and social interaction, and by rigidly fixated interests and repetitive behaviors.","hint":"Social and communication difficulties","unit":"Mental & Physical Health"},{"term":"Anorexia Nervosa","definition":"An eating disorder in which an irrational fear of weight gain leads people to starve themselves.","hint":"Self-starvation","unit":"Mental & Physical Health"},{"term":"Bulimia Nervosa","definition":"An eating disorder characterized by episodes of overeating, followed by vomiting, laxative use, fasting, or excessive exercise.","hint":"Binge-purge behavior","unit":"Mental & Physical Health"},{"term":"Schizophrenic Spectrum Disorders","definition":"A range of disorders characterized by symptoms like delusions, hallucinations, disorganized speech, and/or diminished, inappropriate emotional expression.","hint":"Psychosis spectrum","unit":"Mental & Physical Health"},{"term":"Delusions","definition":"False beliefs, often of persecution or grandeur, that may accompany psychotic disorders.","hint":"Irrational beliefs","unit":"Mental & Physical Health"},{"term":"Delusions of Persecution","definition":"The belief that others are out to get them.","hint":"Paranoia","unit":"Mental & Physical Health"},{"term":"Delusions of Grandeur","definition":"The belief that one has great power, knowledge, or talent.","hint":"Exaggerated self-importance","unit":"Mental & Physical Health"},{"term":"Hallucinations","definition":"False sensory experiences, such as seeing something in the absence of an external visual stimulus.","hint":"Seeing what's not there","unit":"Mental & Physical Health"},{"term":"Disorganized Thinking","definition":"A style of thinking that is typically fragmented and impaired in schizophrenia.","hint":"Jumbled thoughts","unit":"Mental & Physical Health"},{"term":"Disorganized Speech","definition":"A severe disruption of verbal communication in which ideas shift rapidly and incoherently among unrelated topics.","hint":"Incoherent talking","unit":"Mental & Physical Health"},{"term":"Word Salad","definition":"A jumble of incoherent speech as sometimes heard in schizophrenia.","hint":"Random words","unit":"Mental & Physical Health"},{"term":"Disorganized Motor Behavior","definition":"A variety of abnormalities associated with schizophrenia, including silliness, unpredictable agitation, or lack of response.","hint":"Erratic movements","unit":"Mental & Physical Health"},{"term":"Catatonia","definition":"A state of unresponsiveness to one's outside environment, usually including muscle rigidity, staring, and inability to communicate.","hint":"Immobility or agitation","unit":"Mental & Physical Health"},{"term":"Flat Affect","definition":"A marked lack of expressed emotions; a symptom of schizophrenia or depression.","hint":"Emotional flatness","unit":"Mental & Physical Health"},{"term":"Dopamine Hypothesis","definition":"The theory that schizophrenia results from excessive activity of the neurotransmitter dopamine.","hint":"Dopamine excess","unit":"Mental & Physical Health"},{"term":"Positive Symptoms","definition":"Symptoms of schizophrenia that are marked by excesses in functioning, such as delusions, hallucinations, and disorganized speech or behavior.","hint":"Excess behaviors","unit":"Mental & Physical Health"},{"term":"Negative Symptoms","definition":"Symptoms of schizophrenia that are marked by deficits in functioning, such as apathy, lack of emotion, and slowed speech and movement.","hint":"Reduced behaviors","unit":"Mental & Physical Health"},{"term":"Dissociative Disorders","definition":"Disorders in which conscious awareness becomes separated from previous memories, thoughts, and feelings.","hint":"Consciousness disruption","unit":"Mental & Physical Health"},{"term":"Dissociative Amnesia","definition":"A disorder characterized by the sudden and extensive inability to recall important personal information, usually of a traumatic or stressful nature.","hint":"Memory loss","unit":"Mental & Physical Health"},{"term":"Dissociative Fugue","definition":"A type of amnesia involving flight from one's home and identity.","hint":"Travel or wandering","unit":"Mental & Physical Health"},{"term":"Dissociative Identity Disorder","definition":"A rare dissociative disorder in which a person exhibits two or more distinct and alternating personalities, formerly called multiple personality disorder.","hint":"Multiple identities","unit":"Mental & Physical Health"},{"term":"Personality Disorders","definition":"Disorders characterized by inflexible and enduring behavior patterns that impair social functioning.","hint":"Enduring difficulties","unit":"Mental & Physical Health"},{"term":"Cluster A Personality Disorders","definition":"Personality disorders characterized by odd or eccentric ways of thinking.","hint":"Eccentric traits","unit":"Mental & Physical Health"},{"term":"Paranoid Personality Disorder","definition":"Distrust in others, seeing them as deceptive or malevolent without evidence.","hint":"Suspiciousness","unit":"Mental & Physical Health"},{"term":"Schizoid Personality Disorder","definition":"Detachment from social relationships and a restricted range of emotional expression.","hint":"Emotional detachment","unit":"Mental & Physical Health"},{"term":"Schizotypal Personality Disorder","definition":"Discomfort in close relationships, cognitive or perceptual distortions, and eccentricities of behavior.","hint":"Odd behaviors","unit":"Mental & Physical Health"},{"term":"Cluster B Personality Disorders","definition":"Personality disorders characterized by dramatic, overly emotional, or unpredictable thinking or behavior.","hint":"Dramatic traits","unit":"Mental & Physical Health"},{"term":"Antisocial Personality Disorder","definition":"Disregard for and violation of the rights of others, lack of remorse.","hint":"Aggression and manipulation","unit":"Mental & Physical Health"},{"term":"Histrionic Personality Disorder","definition":"Excessive emotionality and attention seeking.","hint":"Dramatic flair","unit":"Mental & Physical Health"},{"term":"Narcissistic Personality Disorder","definition":"Grandiosity, need for admiration, and a lack of empathy.","hint":"Self-centeredness","unit":"Mental & Physical Health"},{"term":"Borderline Personality Disorder","definition":"Instability in interpersonal relationships, self-image, and affects, marked impulsivity.","hint":"Relationship instability","unit":"Mental & Physical Health"},{"term":"Cluster C Personality Disorders","definition":"Personality disorders characterized by anxious, fearful thinking or behavior.","hint":"Anxiety traits","unit":"Mental & Physical Health"},{"term":"Avoidant Personality Disorder","definition":"Extreme shyness, feelings of inadequacy, and sensitivity to rejection.","hint":"Social inhibition","unit":"Mental & Physical Health"},{"term":"Dependent Personality Disorder","definition":"Excessive need to be taken care of, leading to submissive and clinging behavior.","hint":"Dependency on others","unit":"Mental & Physical Health"},{"term":"Obsessive-Compulsive Personality Disorder","definition":"Preoccupation with orderliness, perfection, and control.","hint":"Control and perfectionism","unit":"Mental & Physical Health"},{"term":"Deinstitutionalization","definition":"The release of individuals from psychiatric hospitals into community settings, a movement that began in the mid-20th century.","hint":"Hospital to home","unit":"Mental & Physical Health"},{"term":"Evidence-Based Interventions","definition":"Treatments that are supported by research.","hint":"Research-backed treatments","unit":"Mental & Physical Health"},{"term":"Cultural Humility","definition":"An approach to engagement across cultures that emphasizes openness and self-awareness in learning about others' cultural identities.","hint":"Respect for diversity","unit":"Mental & Physical Health"},{"term":"Therapeutic Alliance","definition":"The relationship between a healthcare professional and a client (or patient).","hint":"Therapeutic relationship","unit":"Mental & Physical Health"},{"term":"Nonmaleficence","definition":"The duty to do no harm.","hint":"Avoiding harm","unit":"Mental & Physical Health"},{"term":"Fidelity","definition":"Commitment to loyalty.","hint":"","unit":"Mental & Physical Health"},{"term":"Integrity","definition":"Honesty, high moral standards; an unimpaired condition.","hint":"Moral uprightness","unit":"Mental & Physical Health"},{"term":"Respect for People's Rights & Dignity","definition":"Upholding the moral and legal rights of others.","hint":"Valuing others","unit":"Mental & Physical Health"},{"term":"Psychodynamic Therapies","definition":"Therapies that explore childhood events and encourage individuals to use this understanding to develop insight into their psychological problems.","hint":"Unconscious exploration","unit":"Mental & Physical Health"},{"term":"Free Association","definition":"A method used in psychodynamic therapy where patients are encouraged to say whatever comes to mind without filter.","hint":"Unfiltered speaking","unit":"Mental & Physical Health"},{"term":"Dream Interpretation","definition":"A method used in psychodynamic therapy to uncover the latent content of a patient's dreams.","hint":"Dream analysis","unit":"Mental & Physical Health"},{"term":"Person-Centered Therapy","definition":"A humanistic therapy, developed by Carl Rogers, in which therapists use techniques such as active listening within a genuine, accepting, empathic environment to facilitate clients' growth.","hint":"Client growth focus","unit":"Mental & Physical Health"},{"term":"Active Listening","definition":"Empathic listening in which the listener echoes, restates, and clarifies.","hint":"Responsive listening","unit":"Mental & Physical Health"},{"term":"Unconditional Positive Regard","definition":"Accepting and respecting others as they are without judgment or evaluation.","hint":"Nonjudgmental acceptance","unit":"Mental & Physical Health"},{"term":"Group Therapy","definition":"Therapy conducted with groups rather than individuals, providing benefits from group interaction.","hint":"Collective healing","unit":"Mental & Physical Health"},{"term":"Individual Therapy","definition":"Therapy modality in which the client and clinician meet one-on-one.","hint":"Personal therapy","unit":"Mental & Physical Health"},{"term":"Cognitive Therapies","definition":"Therapies designed to identify and change maladaptive thinking patterns, perceptions, and behaviors through techniques like cognitive restructuring.","hint":"Thought modification","unit":"Mental & Physical Health"},{"term":"Maladaptive Thinking","definition":"Dysfunctional thought processes that contribute to and exacerbate psychological disorders.","hint":"Harmful thoughts","unit":"Mental & Physical Health"},{"term":"Cognitive Restructuring","definition":"A therapeutic approach that teaches clients to question the automatic beliefs, assumptions, and predictions that often lead to negative emotions and to replace negative thinking with more realistic and positive beliefs.","hint":"Thought reform","unit":"Mental & Physical Health"},{"term":"Cognitive Triad","definition":"An irrational and pessimistic view of the three key elements of a person's belief system present in depression: oneself, the world, and the future.","hint":"Negative belief patterns","unit":"Mental & Physical Health"},{"term":"Applied Behavior Analysis","definition":"A scientific technique concerned with applying empirical approaches based upon the principles of respondent and operant conditioning to change behavior of social significance.","hint":"Behavior modification","unit":"Mental & Physical Health"},{"term":"Exposure Therapy","definition":"A process in cognitive-behavioral therapy that involves the exposure of the patient to the feared object or context without any danger, in order to overcome their anxiety.","hint":"Fear confrontation","unit":"Mental & Physical Health"},{"term":"Systematic Desensitization","definition":"A type of exposure therapy that associates a pleasant relaxed state with gradually increasing anxiety-triggering stimuli, commonly used to treat phobias.","hint":"Gradual fear reduction","unit":"Mental & Physical Health"},{"term":"Aversion Therapy","definition":"A type of behavior therapy that involves repeated pairing of an unwanted behavior with discomfort.","hint":"Negative association","unit":"Mental & Physical Health"},{"term":"Token Economies","definition":"An operant conditioning approach where individuals receive tokens immediately after displaying desirable behavior, which they can collect and exchange for material rewards.","hint":"Reward system","unit":"Mental & Physical Health"},{"term":"Biofeedback","definition":"A process whereby electronic monitoring of a normally automatic bodily function is used to train someone to acquire voluntary control of that function.","hint":"Physiological control learning","unit":"Mental & Physical Health"},{"term":"Cognitive-Behavioral Therapies (CBT)","definition":"A popular integrative therapy that combines cognitive therapy (changing self-defeating thinking) with behavior therapy (changing behavior).","hint":"Thought and action therapy","unit":"Mental & Physical Health"},{"term":"Dialectical Behavior Therapy (DBT)","definition":"A cognitive-behavioral approach that emphasizes the psychosocial aspects of treatment, focusing on the synthesis of opposites.","hint":"Balance-focused therapy","unit":"Mental & Physical Health"},{"term":"Rational-Emotive Behavior Therapy (REBT)","definition":"A confrontational cognitive therapy that vigorously challenges people's illogical, self-defeating attitudes and assumptions.","hint":"Challenge irrational beliefs","unit":"Mental & Physical Health"},{"term":"Hypnosis","definition":"Hypnosis is a therapeutic technique wherein a clinician suggests to a client that certain experiences, perceptions, or behaviors will spontaneously arise, facilitating therapeutic goals such as pain management, stress reduction, and behavioral change.","hint":"Therapeutic trance.","unit":"Mental & Physical Health"},{"term":"Psychotropic Medication Therapy","definition":"The treatment of psychiatric disorders with medications that affect brain chemistry.","hint":"Medication management","unit":"Mental & Physical Health"},{"term":"Psychoactive Medication","definition":"Chemical substances that alter perceptions and moods.","hint":"Mind-altering drugs","unit":"Mental & Physical Health"},{"term":"Antidepressants","definition":"Medications designed to alleviate symptoms of depression by altering levels of neurotransmitters like serotonin.","hint":"","unit":"Mental & Physical Health"},{"term":"Anti-Anxiety Medication","definition":"Medications that help reduce a person's experience of fear or anxiety.","hint":"","unit":"Mental & Physical Health"},{"term":"Lithium","definition":"A chemical used to counteract mood swings of bipolar disorder.","hint":"Mood stabilizer","unit":"Mental & Physical Health"},{"term":"Antipsychotic Medications","definition":"Medications that are used to treat schizophrenia and related psychotic disorders.","hint":"","unit":"Mental & Physical Health"},{"term":"Tardive Dyskinesia","definition":"A neurological disorder marked by chronic tremors and involuntary spastic movements, a possible side effect of long-term use of antipsychotic medications.","hint":"Medication-induced disorder","unit":"Mental & Physical Health"},{"term":"Psychosurgery","definition":"Brain surgery, such as lobotomy, used to correct severe emotional disturbances.","hint":"Brain surgery for behavior","unit":"Mental & Physical Health"},{"term":"Lesioning","definition":"The removal or destruction of part of the brain.","hint":"Brain tissue destruction","unit":"Mental & Physical Health"},{"term":"TMS (Transcranial Magnetic Stimulation)","definition":"A method used to study the brain and to treat some psychological disorders by stimulating the brain with powerful magnets.","hint":"Magnetic brain stimulation","unit":"Mental & Physical Health"},{"term":"Electroconvulsive Therapy (ECT)","definition":"A treatment that involves inducing seizures with the use of electrical current to treat severe depression.","hint":"Shock therapy","unit":"Mental & Physical Health"},{"term":"Lobotomy","definition":"A now-rare psychosurgical procedure once used to calm uncontrollably emotional or violent patients by cutting the nerves connecting the frontal lobes to the emotion-controlling centers of the inner brain.","hint":"Historic brain procedure","unit":"Mental & Physical Health"}]</script>
  <script>
    const CARDS = JSON.parse(document.getElementById('card-data').textContent);
    const UNITS = ['All', 'Biological Bases of Behavior', 'Cognition', 'Development & Learning', 'Social Psychology & Personality', 'Mental & Physical Health'];
    const UNIT_SHORT = {
      'Biological Bases of Behavior': 'Bio',
      'Cognition': 'Cog',
      'Development & Learning': 'Dev',
      'Social Psychology & Personality': 'Social',
      'Mental & Physical Health': 'Health'
    };

    const state = {
      cards: CARDS.map((card, id) => ({ ...card, id, status: 'pending' })),
      queues: {},
      reviewQueue: [],
      counts: { known: 0, review: 0 },
      activeUnit: 'All',
      mode: 'deck',
      currentCardId: null,
      view: { total: 0, completed: 0, label: 'All units' },
      isFlipped: false,
      isAnimating: false,
      drag: { active: false, pointerId: null, startX: 0, deltaX: 0, moved: false, canSwipe: false }
    };

    const els = {
      body: document.body,
      progressCount: document.getElementById('progressCount'),
      progressScope: document.getElementById('progressScope'),
      themeToggle: document.getElementById('themeToggle'),
      filterGroup: document.getElementById('filterGroup'),
      filterButtons: Array.from(document.querySelectorAll('.filter-chip')),
      skipButton: document.getElementById('skipButton'),
          cardShell: document.getElementById('cardShell'),
          flashcard: document.getElementById('flashcard'),
          frontFace: document.getElementById('frontFace'),
          backFace: document.getElementById('backFace'),
          termText: document.getElementById('termText'),
      definitionText: document.getElementById('definitionText'),
      hintWrap: document.getElementById('hintWrap'),
      hintText: document.getElementById('hintText'),
      frontUnitBadge: document.getElementById('frontUnitBadge'),
      backUnitBadge: document.getElementById('backUnitBadge'),
      actions: document.getElementById('cardActions'),
      knownButton: document.getElementById('knownButton'),
      reviewButton: document.getElementById('reviewButton'),
      completionCard: document.getElementById('completionCard'),
      completionKicker: document.getElementById('completionKicker'),
      completionTitle: document.getElementById('completionTitle'),
      completionCopy: document.getElementById('completionCopy'),
      completionTotal: document.getElementById('completionTotal'),
      completionKnown: document.getElementById('completionKnown'),
      completionReview: document.getElementById('completionReview'),
      retryButton: document.getElementById('retryButton'),
      progressFill: document.getElementById('progressFill'),
      knownPill: document.getElementById('knownPill'),
      reviewPill: document.getElementById('reviewPill'),
      knownCount: document.getElementById('knownCount'),
      reviewCount: document.getElementById('reviewCount')
    };

    function shuffle(items) {
      const next = items.slice();
      for (let index = next.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [next[index], next[randomIndex]] = [next[randomIndex], next[index]];
      }
      return next;
    }

    function buildQueues() {
      const queues = { All: shuffle(state.cards.map((card) => card.id)) };
      for (const unit of UNITS.slice(1)) {
        queues[unit] = shuffle(state.cards.filter((card) => card.unit === unit).map((card) => card.id));
      }
      return queues;
    }

    function pendingCountForUnit(unit) {
      const queue = state.queues[unit] || [];
      return queue.reduce((count, id) => count + (state.cards[id].status === 'pending' ? 1 : 0), 0);
    }

    function pendingCountOverall() {
      return state.cards.reduce((count, card) => count + (card.status === 'pending' ? 1 : 0), 0);
    }

    function renderFilters() {
      for (const button of els.filterButtons) {
        const isActive = state.mode === 'deck' && button.dataset.unit === state.activeUnit;
        button.classList.toggle('is-active', isActive);
        button.setAttribute('aria-pressed', String(isActive));
      }
    }

    function pulseCounter(element) {
      element.classList.remove('is-pulsing');
      void element.offsetWidth;
      element.classList.add('is-pulsing');
    }

    function renderCounters(pulseKey = '') {
      els.knownCount.textContent = String(state.counts.known);
      els.reviewCount.textContent = String(state.counts.review);
      if (pulseKey === 'known') {
        pulseCounter(els.knownPill);
      }
      if (pulseKey === 'review') {
        pulseCounter(els.reviewPill);
      }
      els.retryButton.textContent = state.counts.review > 0 ? `Retry review pile (${state.counts.review})` : 'Retry review pile';
      els.retryButton.disabled = state.counts.review === 0;
    }

    function renderProgress() {
      const total = state.view.total;
      const current = total === 0 ? 0 : (state.currentCardId === null ? total : Math.min(state.view.completed + 1, total));
      els.progressCount.textContent = `${current} / ${total}`;
      els.progressScope.textContent = state.mode === 'review'
        ? 'Review pile'
        : (state.activeUnit === 'All' ? 'All units' : state.activeUnit);
      els.progressFill.style.width = total === 0 ? '0%' : `${(state.view.completed / total) * 100}%`;
    }

        function updateCardAria(card) {
          const side = state.isFlipped ? 'Definition showing.' : 'Term showing.';
          const sorting = state.isFlipped
            ? 'Use left arrow for Need review, right arrow for Got it, or swipe to sort.'
            : 'Press space or enter to flip.';
          els.flashcard.setAttribute('aria-label', `Flashcard for ${card.term}. ${side} ${sorting}`);
          els.actions.setAttribute('aria-hidden', String(!state.isFlipped));
          els.flashcard.setAttribute('aria-pressed', String(state.isFlipped));
          els.frontFace.setAttribute('aria-hidden', String(state.isFlipped));
          els.backFace.setAttribute('aria-hidden', String(!state.isFlipped));
        }

    function renderCompletion() {
      const reviewCount = state.counts.review;
      const pendingLeft = pendingCountOverall();
      els.completionKicker.textContent = state.mode === 'review'
        ? 'Review pile'
        : (state.activeUnit === 'All' ? 'All units' : state.activeUnit);

      if (state.mode === 'review') {
        els.completionTitle.textContent = reviewCount > 0 ? 'Review round complete' : 'Review pile cleared';
        els.completionCopy.textContent = reviewCount > 0
          ? `${reviewCount} cards are still marked for review. Run the pile again or switch stacks above.`
          : 'Every card in the review pile has been cleared for this session.';
      } else if (state.view.total === 0) {
        els.completionTitle.textContent = 'Nothing left here';
        els.completionCopy.textContent = pendingLeft > 0
          ? 'This stack is already clear. Choose another unit above to continue studying.'
          : 'Every card in the deck has already been sorted in this session.';
      } else {
        els.completionTitle.textContent = state.activeUnit === 'All' ? 'Deck complete' : `${state.activeUnit} complete`;
        els.completionCopy.textContent = pendingLeft > 0
          ? `${pendingLeft} unsorted cards remain in other stacks. Switch units above or retry the review pile.`
          : 'You have sorted every card in this session.';
      }

      els.completionTotal.textContent = String(state.view.total);
      els.completionKnown.textContent = String(state.counts.known);
      els.completionReview.textContent = String(state.counts.review);
      els.retryButton.textContent = state.counts.review > 0 ? `Retry review pile (${state.counts.review})` : 'Retry review pile';
      els.retryButton.disabled = state.counts.review === 0;
    }

    function renderCard() {
      const hasCard = state.currentCardId !== null;
      els.cardShell.hidden = !hasCard;
      els.completionCard.hidden = hasCard;

      if (!hasCard) {
        renderCompletion();
        renderProgress();
        return;
      }

      const card = state.cards[state.currentCardId];
      els.termText.textContent = card.term;
      els.definitionText.textContent = card.definition;
      els.hintWrap.hidden = !card.hint;
      els.hintText.textContent = card.hint;
      els.frontUnitBadge.textContent = UNIT_SHORT[card.unit] || card.unit;
      els.backUnitBadge.textContent = UNIT_SHORT[card.unit] || card.unit;
      els.frontUnitBadge.title = card.unit;
      els.backUnitBadge.title = card.unit;
      els.cardShell.classList.toggle('is-flipped', state.isFlipped);
      updateCardAria(card);
      renderProgress();
      queueMicrotask(() => els.flashcard.focus({ preventScroll: true }));
    }

    function resetMotion() {
      state.isFlipped = false;
      state.drag = { active: false, pointerId: null, startX: 0, deltaX: 0, moved: false, canSwipe: false };
      els.cardShell.classList.remove('is-flipped', 'is-dragging', 'is-exiting', 'to-known', 'to-review', 'to-skip', 'is-enter-prep', 'is-enter-active');
      els.cardShell.style.removeProperty('--drag-x');
      els.cardShell.style.removeProperty('--drag-rotate');
      els.cardShell.style.removeProperty('--drag-opacity');
    }

    function playEntry(onComplete) {
      els.cardShell.classList.add('is-enter-prep');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          els.cardShell.classList.add('is-enter-active');
          els.cardShell.classList.remove('is-enter-prep');
        });
      });
      window.setTimeout(() => {
        els.cardShell.classList.remove('is-enter-active');
        onComplete?.();
      }, 320);
    }

    function getNextCardId() {
      if (state.mode === 'review') {
        return state.reviewQueue[0] ?? null;
      }
      const queue = state.queues[state.activeUnit] || [];
      while (queue.length && state.cards[queue[0]].status !== 'pending') {
        queue.shift();
      }
      return queue[0] ?? null;
    }

    function syncCard({ animate = true } = {}) {
      state.currentCardId = getNextCardId();
      state.isFlipped = false;
      renderCard();
      if (state.currentCardId !== null && animate) {
        playEntry(() => {
          state.isAnimating = false;
        });
        return;
      }
      state.isAnimating = false;
    }

    function setDeck(unit) {
      state.mode = 'deck';
      state.activeUnit = unit;
      state.reviewQueue = [];
      state.view = {
        total: pendingCountForUnit(unit),
        completed: 0,
        label: unit === 'All' ? 'All units' : unit
      };
      state.isAnimating = false;
      resetMotion();
      renderFilters();
      syncCard({ animate: false });
    }

    function setReviewPile() {
      const reviewIds = state.cards.filter((card) => card.status === 'review').map((card) => card.id);
      state.mode = 'review';
      state.activeUnit = 'All';
      state.reviewQueue = shuffle(reviewIds);
      state.view = {
        total: state.reviewQueue.length,
        completed: 0,
        label: 'Review pile'
      };
      state.isAnimating = false;
      resetMotion();
      renderFilters();
      syncCard({ animate: false });
    }

    function toggleFlip(forceValue) {
      if (state.currentCardId === null || state.isAnimating) {
        return;
      }
      state.isFlipped = typeof forceValue === 'boolean' ? forceValue : !state.isFlipped;
      els.cardShell.classList.toggle('is-flipped', state.isFlipped);
      updateCardAria(state.cards[state.currentCardId]);
    }

    function applyDrag(deltaX) {
      const clamped = Math.max(-220, Math.min(220, deltaX));
      els.cardShell.classList.add('is-dragging');
      els.cardShell.style.setProperty('--drag-x', `${clamped}px`);
      els.cardShell.style.setProperty('--drag-rotate', `${clamped / 20}deg`);
      els.cardShell.style.setProperty('--drag-opacity', String(Math.max(0.58, 1 - Math.abs(clamped) / 420)));
    }

    function clearDrag() {
